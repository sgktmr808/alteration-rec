<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>キャッシュクリア</title>
<style>
body{background:#0a0a0f;color:#efefef;font-family:'Noto Sans JP',sans-serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;margin:0;padding:20px;text-align:center;}
h1{font-size:18px;margin-bottom:8px;}
p{font-size:13px;color:#8888a0;margin-bottom:32px;line-height:1.7;}
.btn{padding:14px 28px;border-radius:12px;border:none;background:#c8a84a;
  color:#0a0a0f;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:16px;
  font-family:inherit;width:100%;max-width:280px;}
.note{font-size:11px;color:#c05a5a;margin-top:8px;}
#msg{margin-top:20px;font-size:14px;color:#5aac7a;min-height:24px;}
</style>
</head>
<body>
<h1>🔄 アプリキャッシュクリア</h1>
<p>アプリのコードキャッシュのみを削除します。<br>
<strong style="color:#c8a84a">登録済みデータは削除されません。</strong></p>
<button class="btn" onclick="clearCache()">キャッシュをクリア</button>
<div class="note">※ 記録データは保持されます</div>
<div id="msg"></div>
<script>
async function clearCache(){
  const msg=document.getElementById('msg');
  msg.textContent='処理中…';
  try{
    // Service Workerのキャッシュのみ削除（localStorageは触れない）
    if('caches' in window){
      const keys=await caches.keys();
      await Promise.all(keys.map(k=>caches.delete(k)));
    }
    // Service Worker登録解除
    if('serviceWorker' in navigator){
      const regs=await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r=>r.unregister()));
    }
    msg.textContent='✅ 完了しました。ホーム画面のアイコンを削除して再追加してください。';
  }catch(e){
    msg.textContent='エラー: '+e.message;
  }
}
</script>
</body>
</html>
