<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="補正記録">
<meta name="theme-color" content="#0d0d0d">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>補正記録</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #0d0d0d;
  --s1: #161616;
  --s2: #1e1e1e;
  --s3: #272727;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --gold: #c9a84c;
  --gold2: #e8c96a;
  --blue: #5b9bd5;
  --green: #5aac7a;
  --red: #c05a5a;
  --amber: #c4843a;
  --text: #efefef;
  --text2: #888;
  --text3: #555;
  --safe-t: env(safe-area-inset-top);
  --safe-b: env(safe-area-inset-bottom);
  --font: 'Noto Sans JP', sans-serif;
  --mono: 'DM Mono', monospace;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);}

/* ── NAV ── */
.nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(13,13,13,0.95);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;
  padding-bottom:calc(var(--safe-b) + 4px);
  z-index:200;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:10px 0 6px;border:none;background:none;color:var(--text3);
  font-size:10px;font-family:var(--font);cursor:pointer;transition:color .15s;
}
.nav-btn.active{color:var(--gold);}
.nav-icon{font-size:20px;line-height:1;}

/* ── SCREENS ── */
.screen{
  display:none;
  min-height:100dvh;
  padding-top:calc(var(--safe-t) + 8px);
  padding-bottom:calc(var(--safe-b) + 70px);
  overflow-y:auto;
}
.screen.active{display:block;}

/* ── HEADER ── */
.hdr{
  padding:12px 16px 10px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  background:rgba(13,13,13,0.92);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
}
.hdr-title{font-size:17px;font-weight:700;letter-spacing:.04em;}
.hdr-sub{font-size:11px;color:var(--text3);font-family:var(--mono);}
.hdr-btn{
  padding:7px 14px;border-radius:20px;border:none;
  background:var(--gold);color:#0d0d0d;
  font-size:13px;font-weight:700;font-family:var(--font);cursor:pointer;
}

/* ── FORM ── */
.form-body{padding:16px;}
.section{
  background:var(--s1);border:1px solid var(--border);
  border-radius:14px;margin-bottom:14px;overflow:hidden;
}
.section-head{
  padding:10px 14px;
  background:var(--s2);border-bottom:1px solid var(--border);
  font-size:11px;font-weight:600;letter-spacing:.1em;
  color:var(--text2);text-transform:uppercase;
  display:flex;align-items:center;gap:6px;
}
.field{padding:12px 14px;border-bottom:1px solid var(--border);}
.field:last-child{border-bottom:none;}
.field label{
  display:block;font-size:11px;color:var(--text3);
  margin-bottom:5px;font-weight:500;letter-spacing:.06em;
}
.field input,.field select,.field textarea{
  width:100%;background:var(--s3);border:1px solid var(--border2);
  border-radius:8px;padding:9px 11px;
  color:var(--text);font-size:15px;font-family:var(--font);
  -webkit-appearance:none;
}
.field textarea{min-height:72px;resize:vertical;line-height:1.5;}
.field input:focus,.field select:focus,.field textarea:focus{
  outline:none;border-color:var(--gold);
}
select option{background:#222;}

/* item selector */
.item-pills{display:flex;flex-wrap:wrap;gap:6px;padding:12px 14px;}
.item-pill{
  padding:6px 12px;border-radius:20px;border:1px solid var(--border2);
  background:var(--s2);color:var(--text2);font-size:13px;
  cursor:pointer;transition:all .15s;
}
.item-pill.active{background:var(--gold);color:#0d0d0d;border-color:var(--gold);font-weight:700;}

/* alteration checks */
.alt-grid{padding:10px 14px;display:flex;flex-direction:column;gap:8px;}
.alt-row{
  display:grid;grid-template-columns:1fr 90px;
  align-items:center;gap:8px;
}
.alt-check{display:flex;align-items:center;gap:8px;}
.alt-check input[type=checkbox]{
  width:18px;height:18px;accent-color:var(--gold);flex-shrink:0;
}
.alt-check label{font-size:14px;color:var(--text);cursor:pointer;}
.alt-dim{
  display:flex;align-items:center;gap:4px;
}
.alt-dim input{
  width:64px;background:var(--s3);border:1px solid var(--border2);
  border-radius:6px;padding:5px 8px;color:var(--text);
  font-size:14px;font-family:var(--mono);text-align:right;
}
.alt-dim input:focus{outline:none;border-color:var(--gold);}
.alt-unit{font-size:12px;color:var(--text3);}

/* risk */
.risk-btns{display:flex;gap:8px;padding:12px 14px;}
.risk-btn{
  flex:1;padding:8px 4px;border-radius:10px;border:1px solid var(--border2);
  background:var(--s2);color:var(--text2);font-size:12px;font-weight:600;
  cursor:pointer;transition:all .15s;text-align:center;
}
.risk-btn.r-ok.active{background:rgba(90,172,122,.2);color:var(--green);border-color:var(--green);}
.risk-btn.r-warn.active{background:rgba(196,132,58,.2);color:var(--amber);border-color:var(--amber);}
.risk-btn.r-ng.active{background:rgba(192,90,90,.2);color:var(--red);border-color:var(--red);}

/* delivery */
.delivery-btns{display:flex;gap:8px;padding:12px 14px;}
.delivery-btn{
  flex:1;padding:9px 4px;border-radius:10px;border:1px solid var(--border2);
  background:var(--s2);color:var(--text2);font-size:13px;font-weight:500;
  cursor:pointer;transition:all .15s;text-align:center;
}
.delivery-btn.active{background:rgba(91,155,213,.15);color:var(--blue);border-color:var(--blue);}

/* price row */
.price-row{
  display:grid;grid-template-columns:1fr 110px;
  align-items:center;gap:8px;padding:12px 14px;
  border-bottom:1px solid var(--border);
}
.price-row:last-child{border-bottom:none;}
.price-name{font-size:14px;color:var(--text);}
.price-input-wrap{display:flex;align-items:center;gap:4px;}
.price-input-wrap input{
  width:80px;background:var(--s3);border:1px solid var(--border2);
  border-radius:8px;padding:7px 8px;color:var(--text);
  font-size:15px;font-family:var(--mono);text-align:right;
}
.price-input-wrap input:focus{outline:none;border-color:var(--gold);}
.price-yen{font-size:13px;color:var(--text3);}
.price-total{
  padding:12px 14px;
  display:flex;justify-content:space-between;align-items:center;
  background:var(--s2);
}
.price-total-label{font-size:13px;color:var(--text2);}
.price-total-val{font-size:22px;font-weight:700;font-family:var(--mono);color:var(--gold);}

/* save btn */
.save-btn{
  display:block;width:calc(100% - 32px);margin:0 16px 16px;
  padding:15px;border-radius:14px;border:none;
  background:var(--gold);color:#0d0d0d;
  font-size:16px;font-weight:700;font-family:var(--font);
  cursor:pointer;letter-spacing:.05em;
}

/* ── LIST ── */
.list-hdr{
  padding:12px 16px;
  display:flex;align-items:center;gap:8px;
}
.search-input{
  flex:1;background:var(--s2);border:1px solid var(--border2);
  border-radius:10px;padding:8px 12px;color:var(--text);
  font-size:15px;font-family:var(--font);
}
.search-input:focus{outline:none;border-color:var(--gold);}
.record-list{padding:0 16px;display:flex;flex-direction:column;gap:10px;}
.record-card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;cursor:pointer;
  transition:border-color .15s;
}
.record-card:active{border-color:var(--gold);}
.rc-head{
  padding:12px 14px;
  display:flex;justify-content:space-between;align-items:flex-start;
  background:var(--s2);border-bottom:1px solid var(--border);
}
.rc-name{font-size:16px;font-weight:700;}
.rc-date{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:2px;}
.rc-badge{
  font-size:11px;font-weight:600;padding:3px 9px;
  border-radius:6px;white-space:nowrap;
}
.badge-ok{background:rgba(90,172,122,.2);color:var(--green);border:1px solid rgba(90,172,122,.3);}
.badge-warn{background:rgba(196,132,58,.2);color:var(--amber);border:1px solid rgba(196,132,58,.3);}
.badge-ng{background:rgba(192,90,90,.2);color:var(--red);border:1px solid rgba(192,90,90,.3);}
.badge-none{background:var(--s3);color:var(--text3);border:1px solid var(--border);}
.rc-body{padding:10px 14px;}
.rc-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;}
.rc-tag{
  font-size:11px;padding:2px 8px;border-radius:5px;
  background:var(--s3);color:var(--text2);border:1px solid var(--border);
}
.rc-foot{
  padding:8px 14px;border-top:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.rc-price{font-size:17px;font-weight:700;font-family:var(--mono);color:var(--gold);}
.rc-delivery{font-size:11px;color:var(--text3);}

/* empty state */
.empty{
  text-align:center;padding:60px 20px;
  color:var(--text3);font-size:14px;line-height:2;
}
.empty-icon{font-size:40px;margin-bottom:12px;}

/* ── STATS ── */
.stats-body{padding:16px;}
.stats-card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:14px;padding:16px;margin-bottom:12px;
}
.stats-label{font-size:11px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.stats-val{font-size:28px;font-weight:700;font-family:var(--mono);color:var(--gold);}
.stats-sub{font-size:12px;color:var(--text3);margin-top:4px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stats-grid .stats-card{margin-bottom:0;}
.stats-grid .stats-val{font-size:22px;}

/* ── DETAIL MODAL ── */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.75);z-index:300;
  overflow-y:auto;
  padding:calc(var(--safe-t) + 16px) 16px calc(var(--safe-b) + 16px);
}
.modal-overlay.open{display:block;}
.modal{
  background:var(--s1);border:1px solid var(--border2);
  border-radius:18px;overflow:hidden;max-width:480px;margin:0 auto;
}
.modal-hdr{
  padding:14px 16px;background:var(--s2);border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.modal-title{font-size:17px;font-weight:700;}
.modal-close{
  width:32px;height:32px;border-radius:50%;border:none;
  background:var(--s3);color:var(--text2);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.modal-body{padding:16px;}
.detail-row{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:8px 0;border-bottom:1px solid var(--border);
  font-size:14px;
}
.detail-row:last-child{border-bottom:none;}
.detail-key{color:var(--text3);font-size:12px;}
.detail-val{color:var(--text);font-weight:500;text-align:right;max-width:60%;}
.modal-actions{
  display:flex;gap:8px;padding:0 16px 16px;
}
.modal-btn{
  flex:1;padding:12px;border-radius:12px;border:none;
  font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;
}
.btn-print{background:var(--s3);color:var(--text2);}
.btn-delete{background:rgba(192,90,90,.15);color:var(--red);border:1px solid rgba(192,90,90,.3);}

/* ── PRINT ── */
@media print {
  body{background:#fff;color:#000;}
  .nav,.hdr,.modal-actions{display:none!important;}
  .modal-overlay{display:block!important;position:static;background:none;padding:0;}
  .modal{border:none;box-shadow:none;max-width:100%;}
  .modal-hdr{background:#f5f5f5;}
  .detail-key{color:#666;}
  .detail-val{color:#000;}
}
</style>
</head>
<body>

<!-- ── NEW RECORD SCREEN ── -->
<div class="screen active" id="screen-new">
  <div class="hdr">
    <div><div class="hdr-title">新規補正記録</div></div>
  </div>
  <div class="form-body">

    <!-- 顧客 -->
    <div class="section">
      <div class="section-head">👤 お客様情報</div>
      <div class="field">
        <label>お名前</label>
        <input type="text" id="f-name" placeholder="山田 花子" autocomplete="off">
      </div>
      <div class="field">
        <label>電話番号（任意）</label>
        <input type="tel" id="f-tel" placeholder="090-0000-0000">
      </div>
    </div>

    <!-- 商品 -->
    <div class="section">
      <div class="section-head">👔 商品情報</div>
      <div class="field">
        <label>ブランド</label>
        <input type="text" id="f-brand" placeholder="CELINE" autocomplete="off">
      </div>
      <div class="field">
        <label>品番・商品名（任意）</label>
        <input type="text" id="f-item-name" placeholder="トレンチコート">
      </div>
      <div class="field">
        <label>素材</label>
        <input type="text" id="f-material" placeholder="ウール100%">
      </div>
      <div>
        <div class="item-pills" id="item-pills"></div>
      </div>
    </div>

    <!-- 補正内容 -->
    <div class="section">
      <div class="section-head">✂️ 補正内容</div>
      <div class="alt-grid" id="alt-grid"></div>
      <div class="field" style="border-top:1px solid var(--border)">
        <label>補足メモ</label>
        <textarea id="f-alt-memo" placeholder="特記事項・お客様要望など"></textarea>
      </div>
    </div>

    <!-- リスク -->
    <div class="section">
      <div class="section-head">⚠️ リスク判定</div>
      <div class="risk-btns">
        <button class="risk-btn r-ok" onclick="setRisk('ok',this)">問題なし</button>
        <button class="risk-btn r-warn" onclick="setRisk('warn',this)">要注意</button>
        <button class="risk-btn r-ng" onclick="setRisk('ng',this)">不可</button>
      </div>
      <div class="field">
        <label>リスク特記</label>
        <textarea id="f-risk-memo" placeholder="芯地の状態、縫い代の確認など"></textarea>
      </div>
    </div>

    <!-- 料金 -->
    <div class="section">
      <div class="section-head">💴 料金</div>
      <div id="price-rows"></div>
      <div class="price-total">
        <span class="price-total-label">合計</span>
        <span class="price-total-val" id="price-total">¥0</span>
      </div>
    </div>

    <!-- お渡し -->
    <div class="section">
      <div class="section-head">📅 お渡し</div>
      <div class="delivery-btns">
        <button class="delivery-btn active" onclick="setDelivery('same',this)">当日渡し</button>
        <button class="delivery-btn" onclick="setDelivery('later',this)">後日渡し</button>
      </div>
      <div class="field" id="delivery-date-field" style="display:none">
        <label>お渡し予定日</label>
        <input type="date" id="f-delivery-date">
      </div>
    </div>

    <button class="save-btn" onclick="saveRecord()">記録を保存</button>
  </div>
</div>

<!-- ── LIST SCREEN ── -->
<div class="screen" id="screen-list">
  <div class="hdr">
    <div><div class="hdr-title">補正記録</div></div>
  </div>
  <div class="list-hdr">
    <input class="search-input" type="search" placeholder="名前・ブランドで検索…" id="search-input" oninput="renderList()">
  </div>
  <div class="record-list" id="record-list"></div>
</div>

<!-- ── STATS SCREEN ── -->
<div class="screen" id="screen-stats">
  <div class="hdr">
    <div><div class="hdr-title">集計</div></div>
  </div>
  <div class="stats-body" id="stats-body"></div>
</div>

<!-- ── DETAIL MODAL ── -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-title" id="modal-title">詳細</span>
      <button class="modal-close" onclick="closeModalBtn()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-actions">
      <button class="modal-btn btn-print" onclick="printRecord()">🖨 伝票印刷</button>
      <button class="modal-btn btn-delete" onclick="deleteRecord()">削除</button>
    </div>
  </div>
</div>

<!-- ── NAV ── -->
<nav class="nav">
  <button class="nav-btn active" id="nav-new" onclick="showScreen('new')">
    <span class="nav-icon">＋</span>新規
  </button>
  <button class="nav-btn" id="nav-list" onclick="showScreen('list')">
    <span class="nav-icon">📋</span>記録
  </button>
  <button class="nav-btn" id="nav-stats" onclick="showScreen('stats')">
    <span class="nav-icon">📊</span>集計
  </button>
</nav>

<script>
// ── DATA DEFINITIONS ──
const ITEMS = [
  { id:'jacket', label:'ジャケット/コート' },
  { id:'pants',  label:'パンツ/スカート' },
  { id:'shirt',  label:'シャツ/ブラウス' },
  { id:'knit',   label:'ニット/カットソー' },
  { id:'dress',  label:'ドレス/ワンピース' },
];

const ALTS = {
  jacket: [
    'ウエスト絞り込み','ウエスト広げ',
    '袖丈詰め','袖丈出し',
    '身丈詰め','身幅詰め','身幅出し',
    '肩幅詰め','袖口詰め','裏地修理',
  ],
  pants: [
    'ウエスト詰め','ウエスト出し',
    '丈詰め（裾上げ）','丈出し',
    'わたり詰め','股上詰め','股上出し',
    'ヒップ詰め','ヒップ出し','裾ダブル加工',
  ],
  shirt: [
    '袖丈詰め','袖丈出し',
    '身丈詰め','身幅詰め','身幅出し',
    'ウエスト絞り','肩幅詰め',
    'ボタン付け替え','襟修理',
  ],
  knit: [
    '袖丈詰め','身丈詰め',
    '身幅詰め','ウエスト絞り',
    'ほつれ補修','穴修理',
  ],
  dress: [
    '身丈詰め','身丈出し',
    'ウエスト絞り','ウエスト出し',
    'バスト詰め','バスト出し',
    'ヒップ詰め','ヒップ出し',
    '肩ひも調整','裾上げ',
  ],
};

// ── STATE ──
let currentItem = null;
let currentRisk = null;
let currentDelivery = 'same';
let currentRecordId = null;

// ── STORAGE ──
function getRecords(){ return JSON.parse(localStorage.getItem('alt_records')||'[]'); }
function saveRecords(r){ localStorage.setItem('alt_records', JSON.stringify(r)); }

// ── INIT ──
function init(){
  renderItemPills();
  renderAltGrid();
  renderPriceRows();
  renderList();
  renderStats();
  setTodayAsDefault();
}

function setTodayAsDefault(){
  const d = new Date();
  const s = d.toISOString().split('T')[0];
  const el = document.getElementById('f-delivery-date');
  if(el) el.value = s;
}

// ── ITEM PILLS ──
function renderItemPills(){
  const el = document.getElementById('item-pills');
  el.innerHTML = ITEMS.map(it =>
    `<button class="item-pill${currentItem===it.id?' active':''}" onclick="selectItem('${it.id}')">${it.label}</button>`
  ).join('');
}

function selectItem(id){
  currentItem = currentItem===id ? null : id;
  renderItemPills();
  renderAltGrid();
  renderPriceRows();
}

// ── ALT GRID ──
function renderAltGrid(){
  const el = document.getElementById('alt-grid');
  if(!currentItem){ el.innerHTML = `<p style="color:var(--text3);font-size:13px;padding:4px 0;">↑ アイテムを選択してください</p>`; return; }
  const alts = ALTS[currentItem]||[];
  el.innerHTML = alts.map((a,i) => `
    <div class="alt-row">
      <div class="alt-check">
        <input type="checkbox" id="ac-${i}" onchange="syncAltDim(${i})">
        <label for="ac-${i}">${a}</label>
      </div>
      <div class="alt-dim">
        <input type="number" id="ad-${i}" placeholder="0" step="0.5" disabled style="opacity:.4">
        <span class="alt-unit">cm</span>
      </div>
    </div>
  `).join('');
}

function syncAltDim(i){
  const cb = document.getElementById(`ac-${i}`);
  const inp = document.getElementById(`ad-${i}`);
  if(inp){ inp.disabled = !cb.checked; inp.style.opacity = cb.checked?'1':'.4'; }
}

// ── PRICE ──
function renderPriceRows(){
  const el = document.getElementById('price-rows');
  if(!currentItem){ el.innerHTML=''; updateTotal(); return; }
  const alts = ALTS[currentItem]||[];
  el.innerHTML = alts.map((a,i) => `
    <div class="price-row" id="pr-${i}" style="display:none">
      <span class="price-name">${a}</span>
      <div class="price-input-wrap">
        <input type="number" id="pp-${i}" value="0" min="0" step="100" oninput="updateTotal()">
        <span class="price-yen">円</span>
      </div>
    </div>
  `).join('');
  updateTotal();
  syncPriceVisibility();
}

function syncPriceVisibility(){
  if(!currentItem) return;
  const alts = ALTS[currentItem]||[];
  alts.forEach((_,i)=>{
    const cb = document.getElementById(`ac-${i}`);
    const row = document.getElementById(`pr-${i}`);
    if(row) row.style.display = (cb&&cb.checked)?'grid':'none';
  });
  updateTotal();
}

document.addEventListener('change', e=>{
  if(e.target.id&&e.target.id.startsWith('ac-')) syncPriceVisibility();
});

function updateTotal(){
  let sum = 0;
  document.querySelectorAll('[id^="pp-"]').forEach(inp=>{
    const row = document.getElementById('pr-'+inp.id.replace('pp-',''));
    if(row&&row.style.display!=='none') sum += parseInt(inp.value||0,10);
  });
  const el = document.getElementById('price-total');
  if(el) el.textContent = '¥'+sum.toLocaleString();
}

// ── RISK ──
function setRisk(val, btn){
  currentRisk = val;
  document.querySelectorAll('.risk-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

// ── DELIVERY ──
function setDelivery(val, btn){
  currentDelivery = val;
  document.querySelectorAll('.delivery-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('delivery-date-field').style.display = val==='later'?'block':'none';
}

// ── SAVE ──
function saveRecord(){
  const name = document.getElementById('f-name').value.trim();
  if(!name){ alert('お名前を入力してください'); return; }
  if(!currentItem){ alert('アイテムを選択してください'); return; }

  const alts = ALTS[currentItem]||[];
  const altItems = [];
  alts.forEach((a,i)=>{
    const cb = document.getElementById(`ac-${i}`);
    if(cb&&cb.checked){
      const dim = document.getElementById(`ad-${i}`);
      const price = document.getElementById(`pp-${i}`);
      altItems.push({
        name:a,
        dim: dim?parseFloat(dim.value||0):0,
        price: price?parseInt(price.value||0,10):0
      });
    }
  });

  let total = 0;
  altItems.forEach(a=>total+=a.price);

  const rec = {
    id: Date.now().toString(),
    createdAt: new Date().toISOString(),
    name,
    tel: document.getElementById('f-tel').value.trim(),
    brand: document.getElementById('f-brand').value.trim(),
    itemName: document.getElementById('f-item-name').value.trim(),
    material: document.getElementById('f-material').value.trim(),
    itemType: currentItem,
    itemLabel: ITEMS.find(i=>i.id===currentItem)?.label||'',
    altItems,
    altMemo: document.getElementById('f-alt-memo').value.trim(),
    risk: currentRisk,
    riskMemo: document.getElementById('f-risk-memo').value.trim(),
    total,
    delivery: currentDelivery,
    deliveryDate: currentDelivery==='later'?document.getElementById('f-delivery-date').value:'',
    status: 'open',
  };

  const records = getRecords();
  records.unshift(rec);
  saveRecords(records);

  resetForm();
  showScreen('list');
  renderList();
  renderStats();
}

function resetForm(){
  ['f-name','f-tel','f-brand','f-item-name','f-material','f-alt-memo','f-risk-memo'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.value='';
  });
  currentItem=null; currentRisk=null; currentDelivery='same';
  document.querySelectorAll('.risk-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.delivery-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.delivery-btn').classList.add('active');
  document.getElementById('delivery-date-field').style.display='none';
  renderItemPills(); renderAltGrid(); renderPriceRows();
}

// ── LIST ──
function renderList(){
  const q = (document.getElementById('search-input')?.value||'').toLowerCase();
  let records = getRecords();
  if(q) records = records.filter(r=>
    r.name.toLowerCase().includes(q)||
    (r.brand||'').toLowerCase().includes(q)
  );

  const el = document.getElementById('record-list');
  if(!records.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">📋</div>記録がありません<br>新規タブから登録してください</div>`;
    return;
  }

  el.innerHTML = records.map(r=>{
    const riskBadge = r.risk==='ok'?'badge-ok 問題なし':r.risk==='warn'?'badge-warn 要注意':r.risk==='ng'?'badge-ng 不可':'badge-none —';
    const [badgeClass, badgeText] = riskBadge.split(' ');
    const date = new Date(r.createdAt).toLocaleDateString('ja-JP',{month:'short',day:'numeric'});
    const alts = (r.altItems||[]).map(a=>`<span class="rc-tag">${a.name}</span>`).join('');
    const delivery = r.delivery==='same'?'当日渡し':(r.deliveryDate?`渡し：${r.deliveryDate}`:'後日渡し');
    return `
      <div class="record-card" onclick="openDetail('${r.id}')">
        <div class="rc-head">
          <div>
            <div class="rc-name">${r.name}</div>
            <div class="rc-date">${date}　${r.brand||''}　${r.itemLabel||''}</div>
          </div>
          <span class="rc-badge ${badgeClass}">${badgeText}</span>
        </div>
        <div class="rc-body">
          <div class="rc-row">${alts||'<span class="rc-tag" style="color:var(--text3)">補正内容なし</span>'}</div>
        </div>
        <div class="rc-foot">
          <span class="rc-price">¥${(r.total||0).toLocaleString()}</span>
          <span class="rc-delivery">${delivery}</span>
        </div>
      </div>
    `;
  }).join('');
}

// ── DETAIL ──
function openDetail(id){
  const r = getRecords().find(r=>r.id===id);
  if(!r) return;
  currentRecordId = id;

  const riskLabel = r.risk==='ok'?'問題なし':r.risk==='warn'?'要注意':r.risk==='ng'?'不可':'未設定';
  const date = new Date(r.createdAt).toLocaleString('ja-JP',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  const delivery = r.delivery==='same'?'当日渡し':(r.deliveryDate||'後日渡し');
  const altLines = (r.altItems||[]).map(a=>`
    <div class="detail-row">
      <span class="detail-key">${a.name}</span>
      <span class="detail-val">${a.dim?a.dim+'cm　':''} ¥${a.price.toLocaleString()}</span>
    </div>
  `).join('');

  document.getElementById('modal-title').textContent = r.name+'さん';
  document.getElementById('modal-body').innerHTML = `
    <div class="detail-row"><span class="detail-key">受付日時</span><span class="detail-val">${date}</span></div>
    <div class="detail-row"><span class="detail-key">ブランド</span><span class="detail-val">${r.brand||'—'}</span></div>
    <div class="detail-row"><span class="detail-key">アイテム</span><span class="detail-val">${r.itemLabel||'—'} ${r.itemName||''}</span></div>
    <div class="detail-row"><span class="detail-key">素材</span><span class="detail-val">${r.material||'—'}</span></div>
    <div class="detail-row"><span class="detail-key">電話</span><span class="detail-val">${r.tel||'—'}</span></div>
    ${altLines}
    ${r.altMemo?`<div class="detail-row"><span class="detail-key">補足メモ</span><span class="detail-val">${r.altMemo}</span></div>`:''}
    <div class="detail-row"><span class="detail-key">リスク</span><span class="detail-val">${riskLabel}</span></div>
    ${r.riskMemo?`<div class="detail-row"><span class="detail-key">リスク特記</span><span class="detail-val">${r.riskMemo}</span></div>`:''}
    <div class="detail-row"><span class="detail-key">お渡し</span><span class="detail-val">${delivery}</span></div>
    <div class="detail-row" style="border-bottom:none"><span class="detail-key">合計金額</span><span class="detail-val" style="font-size:20px;font-family:var(--mono);color:var(--gold)">¥${(r.total||0).toLocaleString()}</span></div>
  `;
  document.getElementById('modal').classList.add('open');
}

function closeModal(e){ if(e.target===document.getElementById('modal')) closeModalBtn(); }
function closeModalBtn(){ document.getElementById('modal').classList.remove('open'); currentRecordId=null; }

function printRecord(){ window.print(); }

function deleteRecord(){
  if(!currentRecordId) return;
  if(!confirm('この記録を削除しますか？')) return;
  let records = getRecords().filter(r=>r.id!==currentRecordId);
  saveRecords(records);
  closeModalBtn();
  renderList();
  renderStats();
}

// ── STATS ──
function renderStats(){
  const records = getRecords();
  const total = records.reduce((s,r)=>s+(r.total||0),0);
  const thisMonth = new Date();
  const monthRecords = records.filter(r=>{
    const d = new Date(r.createdAt);
    return d.getMonth()===thisMonth.getMonth()&&d.getFullYear()===thisMonth.getFullYear();
  });
  const monthTotal = monthRecords.reduce((s,r)=>s+(r.total||0),0);

  const itemCount = {};
  records.forEach(r=>{ if(r.itemLabel) itemCount[r.itemLabel]=(itemCount[r.itemLabel]||0)+1; });
  const topItems = Object.entries(itemCount).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const riskCount = {ok:0,warn:0,ng:0};
  records.forEach(r=>{ if(r.risk) riskCount[r.risk]++; });

  const el = document.getElementById('stats-body');
  el.innerHTML = `
    <div class="stats-card">
      <div class="stats-label">今月の売上</div>
      <div class="stats-val">¥${monthTotal.toLocaleString()}</div>
      <div class="stats-sub">今月 ${monthRecords.length} 件</div>
    </div>
    <div class="stats-grid">
      <div class="stats-card">
        <div class="stats-label">総記録数</div>
        <div class="stats-val">${records.length}</div>
        <div class="stats-sub">件</div>
      </div>
      <div class="stats-card">
        <div class="stats-label">累計売上</div>
        <div class="stats-val">¥${(total/10000).toFixed(1)}<span style="font-size:14px">万</span></div>
        <div class="stats-sub">合計</div>
      </div>
    </div>
    <div class="stats-card">
      <div class="stats-label">リスク分布</div>
      <div style="display:flex;gap:16px;margin-top:8px;">
        <div><span style="color:var(--green);font-size:20px;font-weight:700;font-family:var(--mono)">${riskCount.ok}</span><span style="color:var(--text3);font-size:12px;margin-left:4px">問題なし</span></div>
        <div><span style="color:var(--amber);font-size:20px;font-weight:700;font-family:var(--mono)">${riskCount.warn}</span><span style="color:var(--text3);font-size:12px;margin-left:4px">要注意</span></div>
        <div><span style="color:var(--red);font-size:20px;font-weight:700;font-family:var(--mono)">${riskCount.ng}</span><span style="color:var(--text3);font-size:12px;margin-left:4px">不可</span></div>
      </div>
    </div>
    ${topItems.length?`
    <div class="stats-card">
      <div class="stats-label">アイテム別件数</div>
      <div style="margin-top:10px;display:flex;flex-direction:column;gap:8px;">
        ${topItems.map(([label,count])=>`
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:13px;color:var(--text2)">${label}</span>
            <span style="font-size:15px;font-weight:700;font-family:var(--mono);color:var(--gold)">${count}件</span>
          </div>
        `).join('')}
      </div>
    </div>`:''}
  `;
}

// ── SCREEN NAV ──
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if(name==='list') renderList();
  if(name==='stats') renderStats();
}

// ── BOOT ──
init();
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
