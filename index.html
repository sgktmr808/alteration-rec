<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="補正記録">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>補正記録</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#0a0a0f;--s1:#13131a;--s2:#1a1a24;--s3:#22222e;--s4:#2a2a38;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --gold:#c8a84a;--gold2:#e2c46a;--gold-bg:rgba(200,168,74,0.1);
  --blue:#5b9bd5;--blue-bg:rgba(91,155,213,0.1);
  --green:#5aac7a;--green-bg:rgba(90,172,122,0.1);
  --red:#c05a5a;--red-bg:rgba(192,90,90,0.1);
  --amber:#c4843a;--amber-bg:rgba(196,132,58,0.1);
  --purple:#9b72cf;--purple-bg:rgba(155,114,207,0.1);
  --text:#efefef;--text2:#8888a0;--text3:#55556a;
  --font:'Noto Sans JP',sans-serif;--mono:'DM Mono',monospace;
  --safe-t:env(safe-area-inset-top);--safe-b:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,15,0.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;padding-bottom:calc(var(--safe-b) + 4px);z-index:300;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 6px;border:none;background:none;color:var(--text3);font-size:10px;font-family:var(--font);cursor:pointer;transition:color .15s;letter-spacing:.04em;}
.nav-btn.active{color:var(--gold);}
.nav-icon{font-size:19px;line-height:1;}

/* SCREENS */
.screen{display:none;min-height:100dvh;padding-top:calc(var(--safe-t));padding-bottom:calc(var(--safe-b) + 96px);overflow-y:auto;}
.screen.active{display:block;}

/* HEADER */
.hdr{padding:calc(var(--safe-t)+12px) 16px 11px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.93);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.hdr-title{font-size:17px;font-weight:700;letter-spacing:.03em;}
.hdr-sub{font-size:11px;color:var(--text3);font-family:var(--mono);}
.hdr-ghost{padding:7px 14px;border-radius:20px;border:1px solid var(--border2);background:none;color:var(--text2);font-size:12px;font-family:var(--font);cursor:pointer;}

/* FORM */
.form-scroll{padding:14px 16px 8px;}
.sec{background:var(--s1);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden;}
.sec-hdr{padding:9px 14px;background:var(--s2);border-bottom:1px solid var(--border);font-size:10px;font-weight:600;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;}
.field{padding:11px 14px;border-bottom:1px solid var(--border);}
.field:last-child{border-bottom:none;}
.flabel{font-size:10px;color:var(--text3);margin-bottom:5px;font-weight:500;letter-spacing:.07em;}
.field input,.field select,.field textarea{width:100%;background:var(--s3);border:1px solid var(--border2);border-radius:9px;padding:9px 12px;color:var(--text);font-size:15px;font-family:var(--font);-webkit-appearance:none;transition:border-color .15s;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--gold);}
.field textarea{min-height:72px;resize:vertical;line-height:1.6;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
select option{background:#1a1a24;}

/* TYPE PILLS */
.type-wrap{padding:10px 14px 12px;display:flex;flex-wrap:wrap;gap:6px;}
.tpill{padding:6px 11px;border-radius:20px;border:1px solid var(--border2);background:var(--s2);color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.tpill.aq{background:var(--blue-bg);color:var(--blue);border-color:var(--blue);}
.tpill.as{background:var(--green-bg);color:var(--green);border-color:var(--green);}
.tpill.ac{background:var(--gold-bg);color:var(--gold);border-color:var(--gold);}
.tpill.ar{background:var(--amber-bg);color:var(--amber);border-color:var(--amber);}
.tpill.acl{background:var(--red-bg);color:var(--red);border-color:var(--red);}
.tpill.aos{background:var(--purple-bg);color:var(--purple);border-color:var(--purple);}
.tpill.ao{background:var(--s4);color:var(--text2);border-color:var(--border2);}

/* COLOR/PATTERN PICKER */
.color-grid{padding:10px 14px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.color-swatch{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0;}
.color-swatch.selected{border-color:#fff;transform:scale(1.15);}
.color-label{font-size:11px;color:var(--text3);margin-top:4px;text-align:center;}
.pattern-wrap{padding:6px 14px 12px;display:flex;flex-wrap:wrap;gap:6px;}
.ppill{padding:5px 11px;border-radius:16px;border:1px solid var(--border2);background:var(--s2);color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s;}
.ppill.active{background:var(--gold-bg);color:var(--gold);border-color:var(--gold);}
.color-custom-row{padding:0 14px 12px;display:flex;align-items:center;gap:8px;}
.color-custom-row input[type=color]{width:36px;height:36px;border:none;background:none;cursor:pointer;border-radius:50%;padding:0;}
.color-custom-row input[type=text]{flex:1;background:var(--s3);border:1px solid var(--border2);border-radius:8px;padding:8px 10px;color:var(--text);font-size:14px;font-family:var(--font);}
.color-custom-row input[type=text]:focus{outline:none;border-color:var(--gold);}

/* ALT ITEMS */
.alt-items{padding:10px 14px;display:flex;flex-direction:column;gap:6px;}
.alt-item{background:var(--s2);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.alt-item-head{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;}
.alt-item-head input[type=checkbox]{width:18px;height:18px;accent-color:var(--gold);flex-shrink:0;}
.alt-item-name{font-size:14px;flex:1;}
.alt-item-body{display:none;padding:8px 12px 10px;border-top:1px solid var(--border);background:var(--s3);}
.alt-item-body.open{display:block;}
.dir-btns{display:flex;gap:6px;margin-bottom:8px;}
.dir-btn{flex:1;padding:7px;border-radius:8px;border:1px solid var(--border2);background:var(--s2);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;}
.dir-btn.active-tsume{background:var(--blue-bg);color:var(--blue);border-color:var(--blue);}
.dir-btn.active-dashi{background:var(--amber-bg);color:var(--amber);border-color:var(--amber);}
.dim-row{display:flex;align-items:center;gap:8px;}
.dim-input{flex:1;background:var(--s2);border:1px solid var(--border2);border-radius:8px;padding:8px 10px;color:var(--text);font-size:15px;font-family:var(--mono);text-align:right;}
.dim-input:focus{outline:none;border-color:var(--gold);}
.dim-unit{font-size:13px;color:var(--text3);}
.alt-memo-input{width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:8px;padding:7px 10px;color:var(--text);font-size:13px;font-family:var(--font);margin-top:6px;}
.alt-memo-input:focus{outline:none;border-color:var(--gold);}

/* MACHINE */
.machine-grid{padding:10px 14px;display:flex;flex-direction:column;gap:8px;}
.mrow{display:grid;grid-template-columns:88px 1fr;align-items:center;gap:10px;}
.mlabel{font-size:12px;color:var(--text3);}
.minput{background:var(--s3);border:1px solid var(--border2);border-radius:8px;padding:8px 10px;color:var(--text);font-size:14px;font-family:var(--mono);width:100%;}
.minput:focus{outline:none;border-color:var(--gold);}

/* TIME */
.time-row{display:flex;align-items:center;gap:8px;padding:10px 14px;}
.tbtn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border2);background:var(--s3);color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tval{font-size:22px;font-weight:700;font-family:var(--mono);color:var(--gold);min-width:52px;text-align:center;}
.tunit{font-size:12px;color:var(--text3);}
.tcustom{width:80px;background:var(--s3);border:1px solid var(--border2);border-radius:8px;padding:7px 10px;color:var(--text);font-size:14px;font-family:var(--mono);}
.tcustom:focus{outline:none;border-color:var(--gold);}

/* SAVE */
.save-btn{display:block;width:calc(100%-32px);margin:4px 16px 16px;padding:15px;border-radius:14px;border:none;background:var(--gold);color:#0a0a0f;font-size:16px;font-weight:700;font-family:var(--font);cursor:pointer;letter-spacing:.06em;}

/* CARDS */
.filter-bar{padding:10px 16px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.fpill{flex-shrink:0;padding:6px 12px;border-radius:16px;border:1px solid var(--border2);background:var(--s2);color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s;}
.fpill.active{background:var(--gold);color:#0a0a0f;border-color:var(--gold);font-weight:700;}
.card-list{padding:0 16px;display:flex;flex-direction:column;gap:10px;}
.rcard{background:var(--s1);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:border-color .15s;}
.rcard:active{border-color:var(--gold);}
.rcard-head{padding:11px 14px;background:var(--s2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.rcard-meta{flex:1;min-width:0;}
.rcard-top{display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap;}
.rcard-no{font-size:11px;font-family:var(--mono);color:var(--text3);}
.rcard-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rcard-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.rcard-body{padding:9px 14px;display:flex;flex-wrap:wrap;gap:5px;}
.rtag{font-size:11px;padding:2px 8px;border-radius:5px;background:var(--s3);color:var(--text2);border:1px solid var(--border);}
.rcard-foot{padding:8px 14px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.rdate{font-size:11px;color:var(--text3);}
.rprice{font-size:16px;font-weight:700;font-family:var(--mono);color:var(--gold);}

/* BADGES */
.sbadge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;white-space:nowrap;flex-shrink:0;}
.s-received{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(91,155,213,.3);}
.s-working{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(196,132,58,.3);}
.s-done{background:var(--green-bg);color:var(--green);border:1px solid rgba(90,172,122,.3);}
.s-returned{background:var(--s3);color:var(--text3);border:1px solid var(--border);}
.tbadge{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:600;}
.t-quick{background:var(--blue-bg);color:var(--blue);}
.t-shop{background:var(--green-bg);color:var(--green);}
.t-customer{background:var(--gold-bg);color:var(--gold);}
.t-redo{background:var(--amber-bg);color:var(--amber);}
.t-claim{background:var(--red-bg);color:var(--red);}
.t-other-store{background:var(--purple-bg);color:var(--purple);}
.t-other{background:var(--s3);color:var(--text3);}

/* SEARCH */
.search-wrap{padding:10px 16px 4px;}
.sinput{width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:10px;padding:9px 13px;color:var(--text);font-size:15px;font-family:var(--font);}
.sinput:focus{outline:none;border-color:var(--gold);}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px;line-height:2.2;}
.empty-icon{font-size:36px;margin-bottom:10px;}

/* MODAL */
.overlay{
  display:none;position:fixed;inset:0;z-index:400;
  background:rgba(0,0,0,0.75);
  align-items:flex-end;
  -webkit-overflow-scrolling:touch;
}
.overlay.open{display:flex;}
.modal{
  background:var(--s1);
  border-radius:20px 20px 0 0;
  width:100%;
  max-height:82vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  padding-bottom:calc(var(--safe-b) + 8px);
}
.modal-pull{
  flex-shrink:0;
  display:flex;justify-content:center;
  padding:10px 0 6px;
}
.modal-pull-bar{
  width:36px;height:4px;border-radius:2px;
  background:rgba(255,255,255,0.15);
}
.modal-hdr{
  flex-shrink:0;
  padding:8px 16px 12px;
  background:var(--s2);
  border-bottom:1px solid var(--border);
  font-size:16px;font-weight:700;
}
.modal-inner{
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.modal-body{padding:14px 16px;}
.modal-close-btn{
  flex-shrink:0;
  display:block;
  width:calc(100% - 32px);
  margin:8px 16px 12px;
  padding:14px;
  border-radius:12px;border:none;
  background:var(--gold);color:#0a0a0f;
  font-size:15px;font-weight:700;
  font-family:var(--font);cursor:pointer;
}
/* STEPPER */
.stepper{display:flex;gap:6px;padding:12px 14px;flex-wrap:wrap;}
.stepbtn{flex:1;min-width:76px;padding:8px 4px;border-radius:10px;border:1px solid var(--border2);background:var(--s2);color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center;}
.stepbtn.s-received.on{background:var(--blue-bg);color:var(--blue);border-color:var(--blue);}
.stepbtn.s-working.on{background:var(--amber-bg);color:var(--amber);border-color:var(--amber);}
.stepbtn.s-done.on{background:var(--green-bg);color:var(--green);border-color:var(--green);}
.stepbtn.s-returned.on{background:var(--s4);color:var(--text2);border-color:var(--border2);}

/* MASTER */
.mlist{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.mitem{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--s2);border-radius:9px;border:1px solid var(--border);}
.mitem-name{font-size:14px;}
.mdel{width:26px;height:26px;border-radius:50%;border:none;background:var(--red-bg);color:var(--red);font-size:14px;cursor:pointer;}
.madd-row{display:flex;gap:8px;}
.madd-input{flex:1;background:var(--s3);border:1px solid var(--border2);border-radius:9px;padding:9px 12px;color:var(--text);font-size:15px;font-family:var(--font);}
.madd-input:focus{outline:none;border-color:var(--gold);}
.madd-btn{padding:9px 16px;border-radius:9px;border:none;background:var(--gold);color:#0a0a0f;font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;}
.msection-title{font-size:11px;color:var(--text3);margin:16px 0 8px;letter-spacing:.08em;text-transform:uppercase;}

/* COLOR DOT in card */
.color-dot{width:12px;height:12px;border-radius:50%;display:inline-block;border:1px solid rgba(255,255,255,.2);vertical-align:middle;margin-right:3px;}

@media print{
  body *{visibility:hidden;}
  .print-area, .print-area *{visibility:visible;}
  .print-area{
    position:fixed;inset:0;
    background:#fff;color:#000;
    font-family:'Noto Sans JP',sans-serif;
    padding:16px;
    overflow:visible;
  }
  .print-header{
    border-bottom:2px solid #000;
    padding-bottom:10px;
    margin-bottom:14px;
    display:flex;justify-content:space-between;align-items:flex-end;
  }
  .print-title{font-size:18px;font-weight:700;}
  .print-no{font-size:13px;color:#444;}
  .print-row{
    display:flex;justify-content:space-between;
    padding:6px 0;border-bottom:1px solid #ddd;
    font-size:13px;gap:12px;
  }
  .print-key{color:#666;flex-shrink:0;min-width:90px;}
  .print-val{color:#000;font-weight:500;text-align:right;word-break:break-all;}
  .print-val-pre{color:#000;white-space:pre-wrap;text-align:right;font-size:12px;line-height:1.6;}
  .print-section{font-size:10px;font-weight:700;letter-spacing:.1em;color:#888;text-transform:uppercase;margin:12px 0 4px;}
  .print-footer{margin-top:16px;font-size:11px;color:#888;text-align:right;}
}
</style>
</head>
<body>

<!-- ══ 受付 ══ -->
<div class="screen active" id="screen-new">
  <div class="hdr">
    <div><div class="hdr-title">新規受付</div></div>
    <button class="hdr-ghost" onclick="openMaster()">マスター管理</button>
  </div>
  <div class="form-scroll">

    <!-- 受付情報 -->
    <div class="sec">
      <div class="sec-hdr">📋 受付情報</div>
      <div class="field">
        <div class="flabel">案件種別</div>
        <div class="type-wrap" id="type-pills"></div>
      </div>
      <div class="field">
        <div class="flabel">店名</div>
        <select id="f-store"></select>
      </div>
      <div class="field field-row">
        <div>
          <div class="flabel">持ち込み日</div>
          <input type="date" id="f-in-date">
        </div>
        <div>
          <div class="flabel">持ち込み時刻</div>
          <input type="time" id="f-in-time">
        </div>
      </div>
      <div class="field">
        <div class="flabel">納品日</div>
        <input type="date" id="f-out-date">
      </div>
    </div>

    <!-- 伝票・顧客 -->
    <div class="sec">
      <div class="sec-hdr">🏷 伝票・顧客</div>
      <div class="field">
        <div class="flabel">伝票No.（下5桁）</div>
        <input type="text" id="f-ticket" placeholder="00001" maxlength="5" pattern="[0-9]{5}" autocomplete="off" inputmode="numeric">
      </div>
      <div class="field">
        <div class="flabel">客名</div>
        <input type="text" id="f-client" placeholder="" autocomplete="off">
      </div>
      <div class="field">
        <div class="flabel">担当者名</div>
        <input type="text" id="f-staff" placeholder="" autocomplete="off">
      </div>
    </div>

    <!-- 商品情報 -->
    <div class="sec">
      <div class="sec-hdr">👔 商品情報</div>
      <div class="field">
        <div class="flabel">品名</div>
        <input type="text" id="f-item" placeholder="" autocomplete="off">
      </div>
      <div class="field">
        <div class="flabel">カテゴリー</div>
        <select id="f-category" onchange="onCategoryChange()"></select>
      </div>
      <!-- 色選択 -->
      <div>
        <div class="flabel" style="padding:10px 14px 6px;">色</div>
        <div class="color-grid" id="color-swatches"></div>
        <div class="color-custom-row">
          <input type="color" id="color-custom-picker" value="#888888" onchange="onCustomColor()">
          <input type="text" id="color-custom-text" placeholder="カラー名・色番号（任意）">
        </div>
      </div>
      <!-- 柄選択 -->
      <div>
        <div class="flabel" style="padding:4px 14px 6px;">柄</div>
        <div class="pattern-wrap" id="pattern-pills"></div>
      </div>
      <div class="field">
        <div class="flabel">素材</div>
        <input type="text" id="f-material" placeholder="ウール100%">
      </div>
    </div>

    <!-- 補正内容 -->
    <div class="sec">
      <div class="sec-hdr">✂️ お客様指定 補正箇所</div>
      <div class="alt-items" id="alt-items"></div>
      <div class="field" style="border-top:1px solid var(--border)">
        <div class="flabel">補足メモ</div>
        <textarea id="f-client-alt-memo" placeholder="お客様からの要望・補足"></textarea>
      </div>
    </div>

    <!-- 実行工程 -->
    <div class="sec">
      <div class="sec-hdr">🔧 実行工程箇所 <span style="color:var(--amber);font-size:9px;font-weight:400;margin-left:4px">実際の作業内容</span></div>
      <div class="alt-items" id="work-items"></div>
      <div class="field" style="border-top:1px solid var(--border)">
        <div class="flabel">実行工程メモ・変更点</div>
        <textarea id="f-work-alt-memo" placeholder="指定との差異・追加工程など"></textarea>
      </div>
      <div class="field">
        <div class="flabel">特殊</div>

<script>
// ══ MASTER DATA ══
const TYPES=[
  {id:'quick',label:'クイック',cls:'aq'},
  {id:'shop',label:'店品',cls:'as'},
  {id:'customer',label:'顧客案件',cls:'ac'},

];
const STATUS_LIST=[

  {id:'working',label:'作業中',cls:'s-working'},
  {id:'done',label:'完成',cls:'s-done'},
  {id:'returned',label:'返却済',cls:'s-returned'},
];
const COLORS=[
  {hex:'#1a1a1a',name:'ブラック'},
  {hex:'#2c2c2c',name:'チャコール'},
  {hex:'#4a4a4a',name:'ダークグレー'},
  {hex:'#888888',name:'グレー'},
  {hex:'#cccccc',name:'ライトグレー'},
  {hex:'#f5f5f0',name:'オフホワイト'},
  {hex:'#ffffff',name:'ホワイト'},
  {hex:'#c8a878',name:'ベージュ'},
  {hex:'#8b6914',name:'キャメル'},
  {hex:'#5c3a1e',name:'ブラウン'},
  {hex:'#1a3a5c',name:'ネイビー'},
  {hex:'#1e5c1e',name:'グリーン'},
  {hex:'#8b1a1a',name:'バーガンディ'},
  {hex:'#c8a8c8',name:'ラベンダー'},
];
const PATTERNS=['無地','ストライプ','チェック','ヘリンボーン','ツイード','プリント','ジャカード','その他'];

// カテゴリー別補正サブカテゴリー
// dir: 'both'=詰め/出し両方, 'tsume'=詰めのみ, 'dashi'=出しのみ, 'none'=方向なし
const ALT_MAP={
  'パンツ':[
    {name:'裾上げ',dir:'tsume'},{name:'裾出し',dir:'dashi'},
    {name:'ウエスト詰め',dir:'tsume'},{name:'ウエスト出し',dir:'dashi'},
    {name:'わたり詰め',dir:'tsume'},{name:'わたり出し',dir:'dashi'},
    {name:'股上詰め',dir:'tsume'},{name:'股上出し',dir:'dashi'},
    {name:'ヒップ詰め',dir:'tsume'},{name:'ヒップ出し',dir:'dashi'},
    {name:'テーパード加工',dir:'none'},{name:'裾ダブル加工',dir:'none'},
  ],
  'スカート':[
    {name:'裾上げ',dir:'tsume'},{name:'裾出し',dir:'dashi'},
    {name:'ウエスト詰め',dir:'tsume'},{name:'ウエスト出し',dir:'dashi'},
    {name:'ヒップ詰め',dir:'tsume'},{name:'ヒップ出し',dir:'dashi'},
    {name:'スリット加工',dir:'none'},{name:'裏地修理',dir:'none'},
  ],
  'ジャケット':[
    {name:'裾詰め',dir:'tsume'},{name:'裾出し',dir:'dashi'},
    {name:'袖丈詰め',dir:'tsume'},{name:'袖丈出し',dir:'dashi'},
    {name:'身幅詰め',dir:'tsume'},{name:'身幅出し',dir:'dashi'},
    {name:'ウエスト絞り',dir:'tsume'},{name:'肩幅詰め',dir:'tsume'},
    {name:'袖口詰め',dir:'tsume'},{name:'裏地修理',dir:'none'},
    {name:'ボタン付け替え',dir:'none'},
  ],
  'コート':[
    {name:'裾詰め',dir:'tsume'},{name:'裾出し',dir:'dashi'},
    {name:'袖丈詰め',dir:'tsume'},{name:'袖丈出し',dir:'dashi'},
    {name:'身幅詰め',dir:'tsume'},{name:'身幅出し',dir:'dashi'},
    {name:'ウエスト絞り',dir:'tsume'},{name:'肩幅詰め',dir:'tsume'},
    {name:'裏地修理',dir:'none'},
  ],
  'シャツ':[
    {name:'裾詰め',dir:'tsume'},
    {name:'袖丈詰め',dir:'tsume'},{name:'袖丈出し',dir:'dashi'},
    {name:'身幅詰め',dir:'tsume'},{name:'身幅出し',dir:'dashi'},
    {name:'ウエスト絞り',dir:'tsume'},{name:'肩幅詰め',dir:'tsume'},
    {name:'襟修理',dir:'none'},{name:'ボタン付け替え',dir:'none'},
  ],
  'ブラウス':[
    {name:'裾詰め',dir:'tsume'},
    {name:'袖丈詰め',dir:'tsume'},{name:'袖丈出し',dir:'dashi'},
    {name:'身幅詰め',dir:'tsume'},{name:'身幅出し',dir:'dashi'},
    {name:'ウエスト絞り',dir:'tsume'},{name:'肩幅詰め',dir:'tsume'},
    {name:'ボタン付け替え',dir:'none'},
  ],
  'ニット':[
    {name:'裾詰め',dir:'tsume'},{name:'袖丈詰め',dir:'tsume'},
    {name:'身幅詰め',dir:'tsume'},{name:'ウエスト絞り',dir:'tsume'},
    {name:'ほつれ補修',dir:'none'},{name:'穴修理',dir:'none'},
  ],
  'カットソー':[
    {name:'裾詰め',dir:'tsume'},{name:'袖丈詰め',dir:'tsume'},
    {name:'身幅詰め',dir:'tsume'},{name:'ウエスト絞り',dir:'tsume'},
    {name:'ほつれ補修',dir:'none'},
  ],
  'ドレス':[
    {name:'裾上げ',dir:'tsume'},{name:'裾出し',dir:'dashi'},
    {name:'ウエスト詰め',dir:'tsume'},{name:'ウエスト出し',dir:'dashi'},
    {name:'バスト詰め',dir:'tsume'},{name:'バスト出し',dir:'dashi'},
    {name:'ヒップ詰め',dir:'tsume'},{name:'ヒップ出し',dir:'dashi'},
    {name:'肩ひも調整',dir:'none'},{name:'裏地修理',dir:'none'},
  ],
  'ワンピース':[
    {name:'裾上げ',dir:'tsume'},{name:'裾出し',dir:'dashi'},
    {name:'ウエスト詰め',dir:'tsume'},{name:'ウエスト出し',dir:'dashi'},
    {name:'バスト詰め',dir:'tsume'},{name:'バスト出し',dir:'dashi'},
    {name:'ヒップ詰め',dir:'tsume'},{name:'ヒップ出し',dir:'dashi'},
    {name:'肩ひも調整',dir:'none'},{name:'裏地修理',dir:'none'},
  ],
};
const DEFAULT_CATS=Object.keys(ALT_MAP).concat(['その他']);
const DEFAULT_STORES=['本店'];

// ══ STORAGE ══
const gR=()=>JSON.parse(localStorage.getItem('alt3_rec')||'[]');
const sR=v=>localStorage.setItem('alt3_rec',JSON.stringify(v));
const gSt=()=>JSON.parse(localStorage.getItem('alt3_stores')||JSON.stringify(DEFAULT_STORES));
const sSt=v=>localStorage.setItem('alt3_stores',JSON.stringify(v));
const gCt=()=>JSON.parse(localStorage.getItem('alt3_cats')||JSON.stringify(DEFAULT_CATS));
const sCt=v=>localStorage.setItem('alt3_cats',JSON.stringify(v));

// ══ STATE ══
let currentType=null;
let currentColor={hex:'',name:''};
let currentPattern='';
let currentTime=0;
let currentRecordId=null;
let workFilter='all';
let histFilter='all';

// ══ INIT ══
function init(){
  renderTypePills();
  buildColorSwatches();
  buildPatternPills();
  populateSelects();
  setDefaults();
  renderWork();
  renderHistory();
}

function setDefaults(){
  const now=new Date();
  document.getElementById('f-in-date').value=now.toISOString().split('T')[0];
  document.getElementById('f-in-time').value=now.toTimeString().slice(0,5);
  const out=new Date(now); out.setDate(out.getDate()+3);
  document.getElementById('f-out-date').value=out.toISOString().split('T')[0];
}

function populateSelects(){
  const stores=gSt(); const cats=gCt();
  const ss=document.getElementById('f-store');
  const cs=document.getElementById('f-category');
  ss.innerHTML=stores.map(s=>`<option>${s}</option>`).join('');
  const curCat=cs.value||'パンツ';
  cs.innerHTML=cats.map(c=>`<option${c===curCat?' selected':''}>${c}</option>`).join('');
  onCategoryChange();
}

// ══ TYPE PILLS ══
function renderTypePills(){
  document.getElementById('type-pills').innerHTML=TYPES.map(t=>
    `<button class="tpill${currentType===t.id?' '+t.cls:''}" onclick="selType('${t.id}')">${t.label}</button>`
  ).join('');
}
function selType(id){ currentType=currentType===id?null:id; renderTypePills(); }

// ══ COLOR ══
function buildColorSwatches(){
  const el=document.getElementById('color-swatches');
  el.innerHTML=COLORS.map(c=>
    `<div style="text-align:center">
      <div class="color-swatch${currentColor.hex===c.hex?' selected':''}" style="background:${c.hex};${c.hex==='#ffffff'?'border-color:#555':''}" onclick="selColor('${c.hex}','${c.name}')"></div>
      <div class="color-label">${c.name}</div>
    </div>`
  ).join('');
}
function selColor(hex,name){
  currentColor={hex,name};
  document.getElementById('color-custom-picker').value=hex;
  document.getElementById('color-custom-text').value='';
  buildColorSwatches();
}
function onCustomColor(){
  const hex=document.getElementById('color-custom-picker').value;
  currentColor={hex,name:document.getElementById('color-custom-text').value||hex};
  buildColorSwatches();
}

// ══ PATTERN ══
function buildPatternPills(){
  document.getElementById('pattern-pills').innerHTML=PATTERNS.map(p=>
    `<button class="ppill${currentPattern===p?' active':''}" onclick="selPattern('${p}')">${p}</button>`
  ).join('');
}
function selPattern(p){ currentPattern=currentPattern===p?'':p; buildPatternPills(); }

// ══ CATEGORY / ALT ITEMS ══
function onCategoryChange(){
  const cat=document.getElementById('f-category').value;
  renderAltItems('alt-items', cat);
  renderAltItems('work-items', cat);
}

function renderAltItems(containerId, cat){
  const items=ALT_MAP[cat]||[];
  const el=document.getElementById(containerId);
  if(!items.length){
    el.innerHTML='<div style="padding:10px 0;font-size:13px;color:var(--text3)">補正項目なし</div>';
    return;
  }
  el.innerHTML=items.map((a,i)=>{
    const uid=`${containerId}-${i}`;
    return `
    <div class="alt-item">
      <div class="alt-item-head" onclick="toggleAlt('${uid}')">
        <input type="checkbox" id="chk-${uid}" onclick="event.stopPropagation();toggleAlt('${uid}')">
        <span class="alt-item-name">${a.name}</span>
      </div>
      <div class="alt-item-body" id="body-${uid}">
        ${a.dir==='none'?'':`
        <div class="dir-btns">
          ${a.dir==='both'||a.dir==='tsume'?`<button class="dir-btn" id="dir-tsume-${uid}" onclick="setDir('${uid}','tsume')">詰め</button>`:''}
          ${a.dir==='both'||a.dir==='dashi'?`<button class="dir-btn" id="dir-dashi-${uid}" onclick="setDir('${uid}','dashi')">出し</button>`:''}
        </div>`}
        <div class="dim-row">
          <input class="dim-input" type="number" id="dim-${uid}" placeholder="0.0" step="0.5" min="0">
          <span class="dim-unit">cm</span>
        </div>
        <input class="alt-memo-input" type="text" id="memo-${uid}" placeholder="メモ（任意）">
      </div>
    </div>`;
  }).join('');
}

function toggleAlt(uid){
  const chk=document.getElementById('chk-'+uid);
  const body=document.getElementById('body-'+uid);
  chk.checked=!chk.checked;
  body.classList.toggle('open', chk.checked);
}

function setDir(uid, dir){
  ['tsume','dashi'].forEach(d=>{
    const btn=document.getElementById(`dir-${d}-${uid}`);
    if(btn) btn.className='dir-btn'+(dir===d?` active-${d}`:'');
  });
}

function collectAltItems(containerId, cat){
  const items=ALT_MAP[cat]||[];
  const result=[];
  items.forEach((a,i)=>{
    const uid=`${containerId}-${i}`;
    const chk=document.getElementById('chk-'+uid);
    if(!chk||!chk.checked) return;
    const dim=parseFloat(document.getElementById('dim-'+uid)?.value||0);
    const memo=document.getElementById('memo-'+uid)?.value?.trim()||'';
    let dir='';
    if(document.getElementById(`dir-tsume-${uid}`)?.classList.contains('active-tsume')) dir='詰め';
    else if(document.getElementById(`dir-dashi-${uid}`)?.classList.contains('active-dashi')) dir='出し';
    result.push({name:a.name, dir, dim, memo});
  });
  return result;
}

// ══ TIME ══
function adjTime(d){ currentTime=Math.max(0,currentTime+d); document.getElementById('tdisp').textContent=currentTime; document.getElementById('f-time').value=currentTime||''; }
function syncTime(){ const v=parseInt(document.getElementById('f-time').value||0,10); currentTime=isNaN(v)?0:Math.max(0,v); document.getElementById('tdisp').textContent=currentTime; }

// ══ SAVE ══
function saveRecord(){
  const ticket=document.getElementById('f-ticket').value.trim();
  const client=document.getElementById('f-client').value.trim();
  if(!ticket&&!client){alert('伝票No. または客名を入力してください');return;}
  const cat=document.getElementById('f-category').value;
  const rec={
    id:Date.now().toString(),
    createdAt:new Date().toISOString(),
    type:currentType,
    typeLabel:TYPES.find(t=>t.id===currentType)?.label||'—',
    store:document.getElementById('f-store').value,
    inDate:document.getElementById('f-in-date').value,
    inTime:document.getElementById('f-in-time').value,
    outDate:document.getElementById('f-out-date').value,
    ticket,client,
    staff:document.getElementById('f-staff').value.trim(),
    item:document.getElementById('f-item').value.trim(),
    category:cat,
    colorHex:currentColor.hex,
    colorName:currentColor.name,
    pattern:currentPattern,
    material:document.getElementById('f-material').value.trim(),
    clientAlts:collectAltItems('alt-items',cat),
    clientAltMemo:document.getElementById('f-client-alt-memo').value.trim(),
    workAlts:collectAltItems('work-items',cat),
    workAltMemo:document.getElementById('f-work-alt-memo').value.trim(),
    special:document.getElementById('f-special').value.trim(),
    machine:document.getElementById('m-machine').value.trim(),
    needle:document.getElementById('m-needle').value.trim(),
    thread:document.getElementById('m-thread').value.trim(),
    threadColor:document.getElementById('m-thread-color').value.trim(),
    foot:document.getElementById('m-foot').value.trim(),
    machineMemo:document.getElementById('m-memo').value.trim(),
    time:currentTime,
    materials:document.getElementById('f-materials').value.trim(),
    price:parseInt(document.getElementById('f-price').value||0,10),
    note:document.getElementById('f-note').value.trim(),
    status:'received',
  };
  const recs=gR(); recs.unshift(rec); sR(recs);
  resetForm();
  showScreen('work');
}

function resetForm(){
  ['f-ticket','f-client','f-staff','f-item','f-client-alt-memo','f-work-alt-memo',
   'f-special','m-needle','m-thread','m-thread-color','m-foot','m-memo',
   'f-materials','f-price','f-note'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
  document.getElementById('m-machine').value='JUKI DDL-8300c';
  currentType=null; currentColor={hex:'',name:''}; currentPattern=''; currentTime=0;
  document.getElementById('tdisp').textContent='0';
  document.getElementById('f-time').value='';
  renderTypePills(); buildColorSwatches(); buildPatternPills();
  populateSelects(); setDefaults();
}

// ══ WORK LIST ══
function renderWork(){
  const all=gR().filter(r=>r.status!=='returned');
  document.getElementById('work-count').textContent=all.length?`${all.length}件進行中`:'案件なし';
  const sts=[{id:'all',label:'全て'},{id:'received',label:'受付済'},{id:'working',label:'作業中'},{id:'done',label:'完成'}];
  document.getElementById('work-filter').innerHTML=sts.map(s=>
    `<button class="fpill${workFilter===s.id?' active':''}" onclick="setWF('${s.id}')">${s.label}</button>`
  ).join('');
  const filtered=workFilter==='all'?all:all.filter(r=>r.status===workFilter);
  const el=document.getElementById('work-list');
  el.innerHTML=filtered.length?filtered.map(renderCard).join(''):`<div class="empty"><div class="empty-icon">✂️</div>該当する案件はありません</div>`;
}
function setWF(f){workFilter=f;renderWork();}

// ══ HISTORY ══
function clearDateFilter(){
  document.getElementById('hist-date-from').value='';
  document.getElementById('hist-date-to').value='';
  renderHistory();
}
function renderHistory(){
  const q=(document.getElementById('search-input')?.value||'').toLowerCase();
  const dateFrom=document.getElementById('hist-date-from')?.value||'';
  const dateTo=document.getElementById('hist-date-to')?.value||'';
  let all=gR();
  if(q) all=all.filter(r=>[r.client,r.ticket,r.item,r.material,r.store,r.staff].some(v=>(v||'').toLowerCase().includes(q)));
  if(dateFrom) all=all.filter(r=>r.inDate&&r.inDate>=dateFrom);
  if(dateTo) all=all.filter(r=>r.inDate&&r.inDate<=dateTo);
  const types=[{id:'all',label:'全て'},...TYPES];
  document.getElementById('hist-filter').innerHTML=types.map(t=>
    `<button class="fpill${histFilter===t.id?' active':''}" onclick="setHF('${t.id}')">${t.label}</button>`
  ).join('');
  if(histFilter!=='all') all=all.filter(r=>r.type===histFilter);
  const el=document.getElementById('history-list');
  el.innerHTML=all.length?all.map(renderCard).join(''):`<div class="empty"><div class="empty-icon">📋</div>記録がありません</div>`;
}
function setHF(f){histFilter=f;renderHistory();}

// ══ CARD ══
function renderCard(r){
  const st=STATUS_LIST.find(s=>s.id===r.status)||STATUS_LIST[0];
  const tp=TYPES.find(t=>t.id===r.type);
  const tCls=tp?'t-'+tp.id:'t-other';
  const tLbl=tp?tp.label:'—';
  const inD=r.inDate?r.inDate.slice(5).replace('-','/'):'—';
  const outD=r.outDate?r.outDate.slice(5).replace('-','/'):'—';
  const altTags=(r.clientAlts||[]).slice(0,4).map(a=>`<span class="rtag">${a.name}${a.dir?' '+a.dir:''}${a.dim?' '+a.dim+'cm':''}</span>`).join('');
  const colorDot=r.colorHex?`<span class="color-dot" style="background:${r.colorHex}"></span>`:'';
  const tags=[r.category,r.material].filter(Boolean).map(t=>`<span class="rtag">${t}</span>`).join('');
  return `
    <div class="rcard" onclick="openDetail('${r.id}')">
      <div class="rcard-head">
        <div class="rcard-meta">
          <div class="rcard-top">
            <span class="rcard-no">${r.ticket?'#'+r.ticket:''}</span>
            <span class="tbadge ${tCls}">${tLbl}</span>
          </div>
          <div class="rcard-name">${colorDot}${r.client||r.item||'—'}</div>
          <div class="rcard-sub">${r.store||''}　${r.item||''}</div>
        </div>
        <span class="sbadge ${st.cls}">${st.label}</span>
      </div>
      ${tags||altTags?`<div class="rcard-body">${tags}${altTags}</div>`:''}
      <div class="rcard-foot">
        <span class="rdate">持込 ${inD}　→　納品 ${outD}</span>
        <span class="rprice">${r.price?'¥'+r.price.toLocaleString():''}</span>
      </div>
    </div>`;
}

// ══ DETAIL ══
function openDetail(id){
  const r=gR().find(r=>r.id===id); if(!r) return;
  currentRecordId=id;
  document.getElementById('detail-title').textContent=(r.client||r.ticket||'詳細')+(r.store?' '+r.store:'');
  document.getElementById('detail-stepper').innerHTML=STATUS_LIST.map(s=>
    `<button class="stepbtn ${s.cls}${r.status===s.id?' on':''}" onclick="updateStatus('${id}','${s.id}')">${s.label}</button>`
  ).join('');

  const row=(k,v,pre=false)=>v?`<div class="drow"><span class="dkey">${k}</span><span class="${pre?'dval-pre':'dval'}">${v}</span></div>`:'';
  const altStr=alts=>(alts||[]).map(a=>`${a.name}${a.dir?' '+a.dir:''}${a.dim?' '+a.dim+'cm':''}${a.memo?' ('+a.memo+')':''}`).join('\n');

  document.getElementById('detail-body').innerHTML=
    row('案件種別',r.typeLabel)+
    row('店名',r.store)+
    row('持ち込み',(r.inDate||'')+(r.inTime?' '+r.inTime:''))+
    row('納品予定',r.outDate)+
    row('伝票No.',r.ticket?'#'+r.ticket:'')+
    row('客名',r.client)+
    row('担当者',r.staff)+
    row('品名',r.item)+
    row('カテゴリー',r.category)+
    (r.colorHex?`<div class="drow"><span class="dkey">色</span><span class="dval"><span class="color-dot" style="background:${r.colorHex}"></span>${r.colorName||r.colorHex}</span></div>`:'')+
    row('柄',r.pattern)+
    row('素材',r.material)+
    row('客様指定補正',altStr(r.clientAlts),true)+
    row('指定メモ',r.clientAltMemo,true)+
    row('実行工程',altStr(r.workAlts),true)+
    row('工程メモ',r.workAltMemo,true)+
    row('特殊',r.special,true)+
    row('ミシン',r.machine)+
    row('針番手',r.needle)+
    row('糸番手',r.thread)+
    row('糸色番号',r.threadColor)+
    row('押さえ',r.foot)+
    row('機材メモ',r.machineMemo,true)+
    row('所要時間',r.time?r.time+'分':null)+
    row('使用資材',r.materials,true)+
    row('金額',r.price?'¥'+r.price.toLocaleString():null)+
    row('備考',r.note,true);

  document.getElementById('detail-overlay').classList.add('open');
}

function updateStatus(id,status){
  const recs=gR(); const idx=recs.findIndex(r=>r.id===id);
  if(idx<0) return; recs[idx].status=status; sR(recs);
  openDetail(id); renderWork(); renderHistory();
}

function closeDetailOvl(e){if(e.target===document.getElementById('detail-overlay'))closeDetail();}
function closeDetail(){document.getElementById('detail-overlay').classList.remove('open');currentRecordId=null;}
function deleteRecord(){
  if(!currentRecordId||!confirm('この記録を削除しますか？'))return;
  sR(gR().filter(r=>r.id!==currentRecordId));
  closeDetail(); renderWork(); renderHistory();
}

// ══ MASTER ══
function openMaster(){
  renderMaster();
  document.getElementById('master-overlay').classList.add('open');
}
function closeMasterOvl(e){if(e.target===document.getElementById('master-overlay'))closeMaster();}
function closeMaster(){document.getElementById('master-overlay').classList.remove('open');populateSelects();}

function renderMaster(){
  document.getElementById('store-list').innerHTML=gSt().map((s,i)=>
    `<div class="mitem"><span class="mitem-name">${s}</span><button class="mdel" onclick="delStore(${i})">×</button></div>`
  ).join('');
  document.getElementById('cat-list').innerHTML=gCt().map((c,i)=>
    `<div class="mitem"><span class="mitem-name">${c}</span><button class="mdel" onclick="delCat(${i})">×</button></div>`
  ).join('');
}
function addStore(){const v=document.getElementById('store-input').value.trim();if(!v)return;const s=gSt();s.push(v);sSt(s);document.getElementById('store-input').value='';renderMaster();}
function delStore(i){const s=gSt();s.splice(i,1);sSt(s);renderMaster();}
function addCat(){const v=document.getElementById('cat-input').value.trim();if(!v)return;const c=gCt();c.push(v);sCt(c);document.getElementById('cat-input').value='';renderMaster();}
function delCat(i){const c=gCt();c.splice(i,1);sCt(c);renderMaster();}

// ══ NAV ══
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if(name==='work')renderWork();
  if(name==='history')renderHistory();
  window.scrollTo(0,0);
}

function printRecord(){
  const r=gR().find(r=>r.id===currentRecordId);
  if(!r) return;

  // Remove existing print area
  const old=document.getElementById('print-area');
  if(old) old.remove();

  const tp=TYPES.find(t=>t.id===r.type);
  const st=STATUS_LIST.find(s=>s.id===r.status);
  const altStr=alts=>(alts||[]).map(a=>`${a.name}${a.dir?' '+a.dir:''}${a.dim?' '+a.dim+'cm':''}${a.memo?' ('+a.memo+')':''}`).join('\n');
  const row=(k,v,pre=false)=>v?`<div class="print-row"><span class="print-key">${k}</span><span class="${pre?'print-val-pre':'print-val'}">${v}</span></div>`:'';

  const div=document.createElement('div');
  div.id='print-area';
  div.className='print-area';
  div.innerHTML=`
    <div class="print-header">
      <div>
        <div class="print-title">補正伝票</div>
        <div class="print-no">${r.ticket?'#'+r.ticket:''} ${r.store||''}</div>
      </div>
      <div style="text-align:right;font-size:12px;color:#444;">
        <div>持込：${r.inDate||'—'} ${r.inTime||''}</div>
        <div>納品：${r.outDate||'—'}</div>
      </div>
    </div>
    <div class="print-section">顧客・商品</div>
    ${row('客名',r.client)}
    ${row('担当者',r.staff)}
    ${row('品名',r.item)}
    ${row('カテゴリー',r.category)}
    ${r.colorHex?`<div class="print-row"><span class="print-key">色</span><span class="print-val">${r.colorName||r.colorHex}</span></div>`:''}
    ${row('柄',r.pattern)}
    ${row('素材',r.material)}
    <div class="print-section">補正内容</div>
    ${row('客様指定',altStr(r.clientAlts),true)}
    ${row('指定メモ',r.clientAltMemo,true)}
    ${row('実行工程',altStr(r.workAlts),true)}
    ${row('工程メモ',r.workAltMemo,true)}
    ${row('特殊',r.special,true)}
    <div class="print-section">機材・作業</div>
    ${row('ミシン',r.machine)}
    ${row('針番手',r.needle)}
    ${row('糸番手',r.thread)}
    ${row('糸色番号',r.threadColor)}
    ${row('押さえ',r.foot)}
    ${row('機材メモ',r.machineMemo,true)}
    ${row('所要時間',r.time?r.time+'分':null)}
    ${row('使用資材',r.materials,true)}
    ${row('金額',r.price?'¥'+r.price.toLocaleString():null)}
    ${row('案件種別',tp?.label)}
    ${row('ステータス',st?.label)}
    ${row('備考',r.note,true)}
    <div class="print-footer">Lis 補正記録 / 出力日時：${new Date().toLocaleString('ja-JP')}</div>
  `;
  document.body.appendChild(div);
  window.print();
  setTimeout(()=>div.remove(), 1000);
}

init();
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
