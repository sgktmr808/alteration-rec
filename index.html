<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="補正記録">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>補正記録</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;min-width:0}
:root{
  --bg:#0a0a0f;--s1:#13131a;--s2:#1a1a24;--s3:#22222e;--s4:#2a2a38;
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.13);
  --gold:#c8a84a;--gold-bg:rgba(200,168,74,.12);
  --blue:#5b9bd5;--blue-bg:rgba(91,155,213,.12);
  --green:#5aac7a;--green-bg:rgba(90,172,122,.12);
  --red:#c05a5a;--red-bg:rgba(192,90,90,.12);
  --amber:#c4843a;--amber-bg:rgba(196,132,58,.12);
  --purple:#9b72cf;--purple-bg:rgba(155,114,207,.12);
  --tx:#efefef;--tx2:#8888a0;--tx3:#55556a;
  --f:'Noto Sans JP',sans-serif;--fm:'DM Mono',monospace;
  --st:env(safe-area-inset-top);--sb:env(safe-area-inset-bottom)
}
html,body{height:100%;width:100%;max-width:100vw;overflow-x:hidden;background:var(--bg);color:var(--tx);font-family:var(--f)}
.screen{display:none;min-height:100dvh;width:100%;max-width:100vw;padding-top:0;padding-bottom:calc(env(safe-area-inset-bottom) + 72px);overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.screen.on{display:block}
.nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(10,10,15,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bd);display:flex;padding-bottom:calc(env(safe-area-inset-bottom) + 2px)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 0 5px;border:none;background:none;color:var(--tx3);font-size:10px;font-family:var(--f);cursor:pointer}
.nb.on{color:var(--gold)}
.ni{font-size:20px;line-height:1}
.hdr{padding:calc(env(safe-area-inset-top) + 10px) 16px 10px;display:flex;align-items:center;justify-content:space-between;gap:8px;position:sticky;top:0;z-index:100;width:100%;background:rgba(10,10,15,.93);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--bd)}
.ht{font-size:17px;font-weight:700}
.hv{font-size:10px;color:var(--tx3);font-family:var(--fm);margin-top:1px}
.btn-g{padding:7px 13px;border-radius:18px;border:1px solid var(--bd2);background:none;color:var(--tx2);font-size:12px;font-family:var(--f);cursor:pointer;white-space:nowrap;flex-shrink:0}
.btn-gold{padding:8px 16px;border-radius:18px;border:none;background:var(--gold);color:#0a0a0f;font-size:13px;font-weight:700;font-family:var(--f);cursor:pointer}
.fb{padding:12px 16px 0}
.sec{background:var(--s1);border:1px solid var(--bd);border-radius:14px;margin-bottom:12px;overflow:hidden}
.sh{padding:8px 14px;background:var(--s2);border-bottom:1px solid var(--bd);font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--tx3);text-transform:uppercase}
.fld{padding:10px 14px;border-bottom:1px solid var(--bd)}
.fld:last-child{border-bottom:none}
.fl{font-size:10px;color:var(--tx3);margin-bottom:5px;font-weight:500;letter-spacing:.06em;display:flex;justify-content:space-between;align-items:center}
.fld input[type=text],.fld input[type=number],.fld input[type=date],.fld input[type=time],.fld select,.fld textarea{width:100%;background:var(--s3);border:1px solid var(--bd2);border-radius:9px;padding:9px 12px;color:var(--tx);font-size:15px;font-family:var(--f);-webkit-appearance:none;outline:none}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--gold)}
.fld textarea{min-height:64px;resize:vertical;line-height:1.6}
.fld2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
select option{background:#1a1a24}
.tpill{padding:6px 12px;border-radius:20px;border:1px solid var(--bd2);background:var(--s2);color:var(--tx2);font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.tpill.q{background:var(--blue-bg);color:var(--blue);border-color:var(--blue)}
.tpill.s,.tpill.sp{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.tpill.c{background:var(--gold-bg);color:var(--gold);border-color:var(--gold)}
.tpill.r{background:var(--amber-bg);color:var(--amber);border-color:var(--amber)}
.tpill.cl{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.tpill.os{background:var(--purple-bg);color:var(--purple);border-color:var(--purple)}
.tpill.o{background:var(--s4);color:var(--tx2)}
.tog{padding:5px 12px;border-radius:16px;border:1px solid var(--bd2);background:var(--s3);color:var(--tx2);font-size:12px;font-weight:600;font-family:var(--f);cursor:pointer;transition:all .15s;white-space:nowrap}
.tog.on-a{background:var(--amber-bg);color:var(--amber);border-color:var(--amber)}
.tog.on-b{background:var(--blue-bg);color:var(--blue);border-color:var(--blue)}
.cg{padding:8px 14px;display:flex;flex-wrap:wrap;gap:8px}
.csw{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0}
.csw.on{border-color:#fff;transform:scale(1.2)}
.clb{font-size:9px;color:var(--tx3);text-align:center;margin-top:2px}
.ppill{padding:5px 11px;border-radius:16px;border:1px solid var(--bd2);background:var(--s2);color:var(--tx2);font-size:12px;cursor:pointer;transition:all .15s}
.ppill.on{background:var(--gold-bg);color:var(--gold);border-color:var(--gold)}
.alt-list{padding:8px 14px;display:flex;flex-direction:column;gap:6px}
.ai{background:var(--s2);border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.ah{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer}
.ah input[type=checkbox]{width:18px;height:18px;accent-color:var(--gold);flex-shrink:0;cursor:pointer}
.an{font-size:14px;flex:1}
.ab{display:none;padding:8px 12px 10px;border-top:1px solid var(--bd);background:var(--s3)}
.ab.on{display:block}
.dr{display:flex;gap:6px;margin-bottom:8px}
.db{flex:1;padding:7px 4px;border-radius:8px;border:1px solid var(--bd2);background:var(--s2);color:var(--tx2);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center}
.db.t{background:var(--blue-bg);color:var(--blue);border-color:var(--blue)}
.db.d{background:var(--amber-bg);color:var(--amber);border-color:var(--amber)}
.db.n{background:var(--s4);color:var(--tx2)}
.dtrow{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.dtb{padding:4px 10px;border-radius:14px;font-size:11px;font-weight:600;border:1px solid var(--bd2);background:var(--s2);color:var(--tx2);cursor:pointer;transition:all .15s}
.dtb.on{background:var(--gold-bg);color:var(--gold);border-color:var(--gold)}
.dmrow{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.dmi{flex:1;background:var(--s2);border:1px solid var(--bd2);border-radius:8px;padding:7px 10px;color:var(--tx);font-size:15px;font-family:var(--fm);text-align:right;outline:none}
.dmi:focus{border-color:var(--gold)}
.dmu{font-size:12px;color:var(--tx3)}
.pw{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px}
.pb{padding:5px 10px;border-radius:14px;font-size:12px;border:1px solid var(--bd2);background:var(--s2);color:var(--tx2);cursor:pointer;transition:all .15s}
.pb.on{background:var(--gold-bg);color:var(--gold);border-color:var(--gold)}
.pb.fin{font-size:11px;background:var(--s4)}
.pb.fin.on{background:var(--blue-bg);color:var(--blue);border-color:var(--blue)}
.sw{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px}
.sb{padding:4px 9px;border-radius:12px;font-size:11px;border:1px solid var(--bd2);background:var(--s4);color:var(--tx3);cursor:pointer;transition:all .15s}
.sb.on{background:var(--blue-bg);color:var(--blue);border-color:var(--blue)}
.pm{width:100%;background:var(--s2);border:1px solid var(--bd2);border-radius:8px;padding:7px 10px;color:var(--tx);font-size:13px;font-family:var(--f);outline:none;margin-top:2px}
.pm:focus{border-color:var(--gold)}
.mg{padding:8px 14px;display:flex;flex-direction:column;gap:7px}
.mr{display:grid;grid-template-columns:76px 1fr;align-items:center;gap:8px}
.ml{font-size:12px;color:var(--tx3)}
.mi{background:var(--s3);border:1px solid var(--bd2);border-radius:8px;padding:8px 10px;color:var(--tx);font-size:14px;font-family:var(--fm);width:100%;outline:none}
.mi:focus{border-color:var(--gold)}
.tr{display:flex;align-items:center;gap:8px;padding:10px 14px}
.tb2{width:36px;height:36px;border-radius:50%;border:1px solid var(--bd2);background:var(--s3);color:var(--tx2);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tv{font-size:22px;font-weight:700;font-family:var(--fm);color:var(--gold);min-width:44px;text-align:center}
.tu{font-size:12px;color:var(--tx3)}
.tc{width:68px;background:var(--s3);border:1px solid var(--bd2);border-radius:8px;padding:7px 8px;color:var(--tx);font-size:14px;font-family:var(--fm);outline:none}
.tc:focus{border-color:var(--gold)}
.save-btn{display:block;width:calc(100% - 32px);margin:4px 16px 16px;padding:15px;border-radius:14px;border:none;background:var(--gold);color:#0a0a0f;font-size:16px;font-weight:700;font-family:var(--f);cursor:pointer}
.fbar{padding:8px 16px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.fbar::-webkit-scrollbar{display:none}
.fp{flex-shrink:0;padding:6px 13px;border-radius:16px;border:1px solid var(--bd2);background:var(--s2);color:var(--tx2);font-size:12px;cursor:pointer;transition:all .15s}
.fp.on{background:var(--gold);color:#0a0a0f;border-color:var(--gold);font-weight:700}
.cl{padding:0 16px;display:flex;flex-direction:column;gap:10px}
.rc{background:var(--s1);border:1px solid var(--bd);border-radius:14px;overflow:hidden;cursor:pointer}
.rh{padding:10px 14px;background:var(--s2);border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.rm{flex:1;min-width:0}
.rt{display:flex;align-items:center;gap:6px;margin-bottom:2px;flex-wrap:wrap}
.rno{font-size:11px;font-family:var(--fm);color:var(--tx3)}
.rn{font-size:15px;font-weight:700}
.rs{font-size:12px;color:var(--tx2);margin-top:1px}
.rb{padding:8px 14px;display:flex;flex-wrap:wrap;gap:4px}
.rtg{font-size:11px;padding:2px 7px;border-radius:5px;background:var(--s3);color:var(--tx2);border:1px solid var(--bd)}
.rf{padding:7px 14px;border-top:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.rd{font-size:11px;color:var(--tx3)}
.rp{font-size:15px;font-weight:700;font-family:var(--fm);color:var(--gold)}
.sbg{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;white-space:nowrap;flex-shrink:0}
.s-recv{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(91,155,213,.3)}
.s-work{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(196,132,58,.3)}
.s-done{background:var(--green-bg);color:var(--green);border:1px solid rgba(90,172,122,.3)}
.s-ret{background:var(--s3);color:var(--tx3);border:1px solid var(--bd)}
.tbg{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:600}
.sw2{padding:8px 16px 4px}
.si{width:100%;background:var(--s2);border:1px solid var(--bd2);border-radius:10px;padding:9px 13px;color:var(--tx);font-size:15px;font-family:var(--f);outline:none}
.si:focus{border-color:var(--gold)}
.df{padding:6px 16px 0;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.df label{font-size:10px;color:var(--tx3);display:block;margin-bottom:3px}
.df input{width:100%;background:var(--s2);border:1px solid var(--bd2);border-radius:9px;padding:8px 10px;color:var(--tx);font-size:13px;font-family:var(--f);-webkit-appearance:none;outline:none}
.df input:focus{border-color:var(--gold)}
.cd-btn{display:block;text-align:right;padding:4px 16px 0;font-size:11px;color:var(--tx3);background:none;border:none;cursor:pointer;font-family:var(--f)}
.htw{overflow-x:auto;padding:8px 16px;-webkit-overflow-scrolling:touch}
.ht{width:100%;border-collapse:collapse;font-size:12px;min-width:680px}
.ht th{background:var(--s2);color:var(--tx3);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:8px 10px;text-align:left;border-bottom:2px solid var(--bd2);white-space:nowrap;position:sticky;top:0}
.ht td{padding:8px 10px;border-bottom:1px solid var(--bd);color:var(--tx);white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.ht tr:hover td,.ht tr:active td{background:var(--s2)}
.empty{text-align:center;padding:56px 20px;color:var(--tx3);font-size:14px;line-height:2.4}
.ei{font-size:36px;margin-bottom:8px}
.ov{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.78);align-items:flex-end}
.ov.on{display:flex}
.md{background:var(--s1);border-radius:20px 20px 0 0;width:100%;max-width:100vw;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;padding-bottom:calc(var(--sb) + 8px)}
.mp{flex-shrink:0;display:flex;justify-content:center;padding:10px 0 4px}
.mpb{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.15)}
.mh{flex-shrink:0;padding:8px 16px 12px;background:var(--s2);border-bottom:1px solid var(--bd);font-size:16px;font-weight:700}
.ms{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.mb{padding:14px 16px}
.mc{display:block;width:calc(100% - 32px);margin:8px 16px 4px;padding:14px;border-radius:12px;border:none;background:var(--gold);color:#0a0a0f;font-size:15px;font-weight:700;font-family:var(--f);cursor:pointer}
.dw{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--bd);gap:10px}
.dw:last-child{border-bottom:none}
.dk{font-size:11px;color:var(--tx3);flex-shrink:0;padding-top:2px}
.dv{font-size:14px;color:var(--tx);font-weight:500;text-align:right;word-break:break-all}
.dvp{font-size:13px;color:var(--tx);white-space:pre-wrap;text-align:right;line-height:1.6}
.ma{display:flex;gap:8px;padding:0 16px}
.mac{flex:1;padding:11px;border-radius:11px;border:none;font-size:13px;font-weight:600;font-family:var(--f);cursor:pointer}
.step{display:flex;gap:6px;padding:10px 14px;flex-wrap:wrap}
.stb{flex:1;min-width:68px;padding:8px 4px;border-radius:10px;border:1px solid var(--bd2);background:var(--s2);color:var(--tx3);font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.stb.recv{background:var(--blue-bg);color:var(--blue);border-color:var(--blue)}
.stb.work{background:var(--amber-bg);color:var(--amber);border-color:var(--amber)}
.stb.done{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.stb.ret{background:var(--s4);color:var(--tx2)}
.mst{font-size:11px;color:var(--tx3);margin:12px 0 6px;letter-spacing:.08em;text-transform:uppercase}
.mli{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.mit{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--s2);border-radius:9px;border:1px solid var(--bd)}
.mn{font-size:14px}
.mdl{width:26px;height:26px;border-radius:50%;border:none;background:var(--red-bg);color:var(--red);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mar{display:flex;gap:8px}
.mai{flex:1;background:var(--s3);border:1px solid var(--bd2);border-radius:9px;padding:9px 12px;color:var(--tx);font-size:15px;font-family:var(--f);outline:none}
.mai:focus{border-color:var(--gold)}
.mab{padding:9px 16px;border-radius:9px;border:none;background:var(--gold);color:#0a0a0f;font-size:14px;font-weight:700;font-family:var(--f);cursor:pointer}
.ea{display:none;margin-bottom:12px}
.eat{width:100%;background:var(--s3);border:1px solid var(--bd2);border-radius:9px;padding:10px;color:var(--tx);font-size:12px;font-family:var(--fm);min-height:70px;resize:none;line-height:1.5;outline:none}
.cpb{width:100%;margin-top:5px;padding:9px;border-radius:9px;border:1px solid var(--bd2);background:var(--s3);color:var(--tx2);font-size:13px;font-weight:600;font-family:var(--f);cursor:pointer}
.imb{width:100%;margin-top:5px;padding:9px;border-radius:9px;border:none;background:var(--green);color:#0a0a0f;font-size:13px;font-weight:700;font-family:var(--f);cursor:pointer}
@media print{
  body *{visibility:hidden}
  #print-area,#print-area *{visibility:visible}
  #print-area{position:fixed;inset:0;background:#fff;color:#000;font-family:var(--f);padding:16px;overflow:visible}
  .ph{border-bottom:2px solid #000;padding-bottom:10px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:flex-end}
  .pt{font-size:18px;font-weight:700}
  .pn{font-size:12px;color:#444}
  .pr{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #ddd;font-size:13px;gap:10px}
  .pk{color:#666;flex-shrink:0;min-width:90px}
  .pv{color:#000;font-weight:500;text-align:right;word-break:break-all}
  .pvp{color:#000;white-space:pre-wrap;text-align:right;font-size:12px;line-height:1.6}
  .ps{font-size:10px;font-weight:700;letter-spacing:.1em;color:#888;text-transform:uppercase;margin:10px 0 4px}
  .pf{margin-top:14px;font-size:11px;color:#888;text-align:right}
}
</style>
</head>
<body>

<div class="screen on" id="scr-new">
  <div class="hdr">
    <div><div class="ht">新規受付</div><div class="hv">v16</div></div>
    <button class="btn-g" onclick="openMaster()">⚙️ 設定</button>
  </div>
  <div class="fb">
    <div class="sec">
      <div class="sh">📋 受付情報</div>
      <div class="fld"><div class="fl">案件種別</div><div id="type-wrap" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px"></div></div>
      <div class="fld"><div class="fl">店名</div><select id="f-store"></select></div>
      <div class="fld"><div class="fld2">
        <div><div class="fl">持ち込み日</div><input type="date" id="f-in-date"></div>
        <div><div class="fl">持ち込み時刻</div><input type="time" id="f-in-time"></div>
      </div></div>
      <div class="fld"><div class="fl">納品日</div><input type="date" id="f-out-date"></div>
    </div>
    <div class="sec">
      <div class="sh">🏷 伝票・顧客</div>
      <div class="fld"><div class="fl">伝票No.（下5桁）</div><input type="text" id="f-ticket" maxlength="5" inputmode="numeric" autocomplete="off"></div>
      <div class="fld">
        <div class="fl">客名 <button id="btn-staff" class="tog" onclick="togStaff()">スタッフ</button></div>
        <input type="text" id="f-client" autocomplete="off">
      </div>
      <div class="fld"><div class="fl">担当者名</div><input type="text" id="f-staff" autocomplete="off"></div>
    </div>
    <div class="sec">
      <div class="sh">👔 商品情報</div>
      <div class="fld"><div class="fl">品名</div><input type="text" id="f-item" autocomplete="off"></div>
      <div class="fld"><div class="fl">カテゴリー</div><select id="f-cat" onchange="onCatChange()"></select></div>
      <div>
        <div class="fl" style="padding:10px 14px 6px">色</div>
        <div class="cg" id="color-wrap"></div>

function buildAlts(cid,cat,isW){
  const items=ALT[cat]||[];
  const el=document.getElementById(cid);
  if(!items.length){el.innerHTML='<div style="padding:6px 0;font-size:13px;color:var(--tx3)">補正項目なし</div>';return;}
  el.innerHTML=items.map((a,i)=>{

      </div>

        ${buildAB(a,uid,isW)}

}

function buildAB(a,uid,isW){
  let h='';
  if(a.d!=='none'){
    h+=`<div class="dr">`;
    if(a.d==='both'||a.d==='tsume')h+=`<button class="db" id="db-t-${uid}" onclick="setDir('${uid}','t')">詰め</button>`;
    if(a.d==='both'||a.d==='dashi')h+=`<button class="db" id="db-d-${uid}" onclick="setDir('${uid}','d')">出し</button>`;
    if(a.d==='both')h+=`<button class="db" id="db-n-${uid}" onclick="setDir('${uid}','n')">未定</button>`;
    h+=`</div>`;
  }
  if(a.dm==='len'){
    h+=`<div class="dtrow">
      ${['股下','カット寸法','総丈'].map(t=>`<button class="dtb" id="dtb-${uid}-${t.replace(' ','_')}" onclick="setDT('${uid}','${t}')">${t}</button>`).join('')}
    </div>
    <div class="dmrow">
      <input class="dmi" type="number" id="dim-${uid}" placeholder="0.0" step="0.5" min="0">
      <span class="dmu">cm</span>
    </div>`;
  }else if(a.dm==='cm'){
    h+=`<div class="dmrow">
      <input class="dmi" type="number" id="dim-${uid}" placeholder="0.0" step="0.5" min="0">
      <span class="dmu">cm</span>
    </div>`;
  }
  if(isW){
    const pm=PROC[a.n];
    if(pm){
      h+=`<div class="pw" id="pw-${uid}">`;
      pm.m.forEach(m=>{
        h+=`<button class="pb${m.fin?' fin':''}" id="pb-${uid}-${m.id}" data-ex="${m.ex||''}" onclick="togProc('${uid}','${m.id}','${a.n}')">${m.l}</button>`;
      });
      h+=`</div><div class="sw" id="sw-${uid}"></div>`;
    }
  }
  h+=`<input class="pm" type="text" id="memo-${uid}" placeholder="メモ（任意）">`;
  return h;
}

function togAlt(uid){
  const chk=document.getElementById('chk-'+uid);
  const body=document.getElementById('body-'+uid);
  chk.checked=!chk.checked;
  body.classList.toggle('on',chk.checked);
}
function setDir(uid,d){
  ['t','d','n'].forEach(x=>{
    const b=document.getElementById(`db-${x}-${uid}`);
    if(b)b.className='db'+(d===x?' '+d:'');
  });
  document.getElementById('body-'+uid).dataset.dv=d;
}
function setDT(uid,t){
  ['股下','カット寸法','総丈'].forEach(x=>{
    const b=document.getElementById(`dtb-${uid}-${x.replace(' ','_')}`);
    if(b)b.className='dtb'+(t===x?' on':'');
  });
  document.getElementById('body-'+uid).dataset.dl=t;
}
function togProc(uid,mid,nm){
  const body=document.getElementById('body-'+uid);
  const pm=PROC[nm];if(!pm)return;
  const m=pm.m.find(x=>x.id===mid);if(!m)return;
  let procs=JSON.parse(body.dataset.procs||'[]');
  if(procs.includes(m.l)){
    procs=procs.filter(p=>p!==m.l);
    let subs=JSON.parse(body.dataset.subs||'{}');
    delete subs[m.l];body.dataset.subs=JSON.stringify(subs);
  }else{
    if(m.ex){
      pm.m.filter(x=>x.ex===m.ex&&x.id!==mid).forEach(x=>{
        procs=procs.filter(p=>p!==x.l);
        const b=document.getElementById(`pb-${uid}-${x.id}`);
        if(b)b.classList.remove('on');
      });
    }
    procs.push(m.l);
  }
  body.dataset.procs=JSON.stringify(procs);
  pm.m.forEach(x=>{
    const b=document.getElementById(`pb-${uid}-${x.id}`);
    if(b)b.classList.toggle('on',procs.includes(x.l));
  });
  updSubs(uid,nm,procs);
}
function updSubs(uid,nm,procs){
  const sw=document.getElementById('sw-'+uid);if(!sw)return;
  const pm=PROC[nm];if(!pm)return;
  const body=document.getElementById('body-'+uid);
  const subs=JSON.parse(body.dataset.subs||'{}');
  let h='';
  procs.forEach(l=>{
    const m=pm.m.find(x=>x.l===l);
    if(m&&m.sub)m.sub.forEach(s=>{
      const on=subs[l]&&subs[l].includes(s);
      h+=`<button class="sb${on?' on':''}" onclick="togSub('${uid}','${l}','${s}')">${s}</button>`;
    });
  });
  sw.innerHTML=h;
}
function togSub(uid,pl,sv){
  const body=document.getElementById('body-'+uid);
  let subs=JSON.parse(body.dataset.subs||'{}');
  if(!subs[pl])subs[pl]=[];
  const i=subs[pl].indexOf(sv);
  if(i>=0)subs[pl].splice(i,1);else subs[pl].push(sv);
  body.dataset.subs=JSON.stringify(subs);
  const procs=JSON.parse(body.dataset.procs||'[]');
  updSubs(uid,pl,procs);
}

// ══ COLLECT ══
function colAlts(cid,cat){
  const items=ALT[cat]||[];
  const isW=cid==='alt-work';
  return items.map((a,i)=>{
    const uid=cid+'-'+i;
    const chk=document.getElementById('chk-'+uid);
    if(!chk||!chk.checked)return null;
    const body=document.getElementById('body-'+uid);
    const dv=body.dataset.dv||'';
    const dir=dv==='t'?'詰め':dv==='d'?'出し':dv==='n'?'未定':'';
    const dimEl=document.getElementById('dim-'+uid);
    const dim=dimEl?(parseFloat(dimEl.value)||null):null;
    const dl=body.dataset.dl||'';
    const memo=document.getElementById('memo-'+uid)?.value?.trim()||'';
    if(isW){
      const procs=JSON.parse(body.dataset.procs||'[]');
      const subs=JSON.parse(body.dataset.subs||'{}');
      return{n:a.n,dir,procs,subs,memo};
    }
    return{n:a.n,dir,dim,dl,memo};
  }).filter(Boolean);
}

          <span class="rno">${r.ticket?'#'+r.ticket:''}</span>
          ${r.typeCls?`<span class="tbg ${r.typeCls}">${r.typeLbl}</span>`:''}
        </div>
        <div class="rn">${r.client||r.item||'—'}${r.isStaff?' 👤':''}</div>
        <div class="rs">${r.store||''} ${r.item||''}</div>
      </div>
      <span class="sbg s-${st.id}">${st.label}</span>
    </div>
    ${tags?`<div class="rb">${tags}</div>`:''}
    <div class="rf">
      <span class="rd">持込 ${inD} → 納品 ${outD}</span>
      <span class="rp">${r.price?'¥'+r.price.toLocaleString():''}</span>
    </div>
  </div>`;
}

// ══ STRING HELPERS ══
function aSum(alts){
  return (alts||[]).map(a=>{
    let s=a.n+(a.dir?' '+a.dir:'');
    if(a.dl)s+=' ['+a.dl+']';
    if(a.dim)s+=' '+a.dim+'cm';
    return s;
  }).join(' / ');
}
function wStr(alts){
  return (alts||[]).map(a=>{
    let s=a.n+(a.dir?' '+a.dir:'');
    const ps=a.procs||[];
    if(ps.length){
      const sb=a.subs||{};
      s+=' ['+ps.map(p=>{const sl=sb[p]||[];return p+(sl.length?'('+sl.join('/')+')'  :'');}).join('/')+']';
    }
    if(a.memo)s+=' ('+a.memo+')';
    return s;
  }).join('\n');
}
function dw(k,v,pre=false){
  if(v===null||v===undefined||v==='')return'';
  return `<div class="dw"><span class="dk">${k}</span><span class="${pre?'dvp':'dv'}">${v}</span></div>`;
}

// ══ CSV ══
function doCSV(){
  const q=(document.getElementById('srch')?.value||'').toLowerCase();
  const df=document.getElementById('hf')?.value||'';
  const dt=document.getElementById('ht2')?.value||'';
  let all=gR();
  if(q)all=all.filter(r=>[r.client,r.ticket,r.item,r.mat,r.store,r.staff].some(v=>(v||'').toLowerCase().includes(q)));
  if(df)all=all.filter(r=>r.inDate&&r.inDate>=df);
  if(dt)all=all.filter(r=>r.inDate&&r.inDate<=dt);
  if(hiFil!=='all')all=all.filter(r=>r.type===hiFil);
  if(!all.length){alert('出力するデータがありません');return;}
  const e=v=>{const s=String(v||'');return(s.includes(',')||s.includes('"')||s.includes('\n'))?'"'+s.replace(/"/g,'""')+'"':s;};
  const stL=id=>(STATUS.find(s=>s.id===id)||{label:''}).label;
  const tpL=id=>(TYPES.find(t=>t.id===id)||{label:''}).label;
  const hd=['持込日','持込時刻','納品日','伝票No.','案件種別','店名','客名','担当者','品名','カテゴリー','色','柄','素材','客様指定補正','実行工程','機材','針番手','糸番手','糸色番号','押さえ','機材メモ','所要時間(分)','使用資材','金額','備考','ステータス'];
  const rows=all.map(r=>[
    r.inDate,r.inTime,r.outDate,r.ticket?'#'+r.ticket:'',
    tpL(r.type),r.store,r.client+(r.isStaff?' [スタッフ]':''),r.staff,
    r.item,r.cat,r.clrN||r.clrH,r.pat,r.mat+(r.isSpm?' [特殊素材]':''),
    aSum(r.cAlts),wStr(r.wAlts).replace(/\n/g,' / '),
    r.machine,r.needle,r.thread,r.tcolor,r.foot,r.mmemo,
    r.time||'',r.materials,r.price||'',r.note,stL(r.status)
  ].map(e).join(','));
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+[hd.map(e).join(','),...rows].join('\n')],{type:'text/csv;charset=utf-8;'}));
  a.download='補正記録_'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
}

// ══ OVERLAY ══
function openOv(id){document.getElementById(id).classList.add('on');}
function closeOvBtn(id){document.getElementById(id).classList.remove('on');}
function closeOv(id,e){if(e.target===document.getElementById(id))closeOvBtn(id);}

// ══ MASTER ══
function openMaster(){renderMaster();openOv('ov-master');}
function closeMaster(){
  closeOvBtn('ov-master');
  document.getElementById('exp-area').style.display='none';
  document.getElementById('imp-area').style.display='none';
  populateSels();
}
function renderMaster(){
  document.getElementById('store-list').innerHTML=gSt().map((s,i)=>
    `<div class="mit"><span class="mn">${s}</span><button class="mdl" onclick="delStore(${i})">×</button></div>`
  ).join('');
  document.getElementById('cat-list').innerHTML=gCt().map((c,i)=>
    `<div class="mit"><span class="mn">${c}</span><button class="mdl" onclick="delCat(${i})">×</button></div>`
  ).join('');
}
function addStore(){
  const v=document.getElementById('store-inp').value.trim();
  if(!v)return;const st=gSt();st.push(v);sSt(st);
  document.getElementById('store-inp').value='';renderMaster();
}
function delStore(i){const st=gSt();st.splice(i,1);sSt(st);renderMaster();}
function addCat(){
  const v=document.getElementById('cat-inp').value.trim();
  if(!v)return;const ct=gCt();ct.push(v);sCt(ct);
  document.getElementById('cat-inp').value='';renderMaster();
}
function delCat(i){const ct=gCt();ct.splice(i,1);sCt(ct);renderMaster();}

function doExport(){
  const data={stores:gSt(),cats:gCt(),exported:new Date().toISOString()};
  document.getElementById('exp-text').value=JSON.stringify(data,null,2);
  document.getElementById('exp-area').style.display='block';
  document.getElementById('imp-area').style.display='none';
  document.getElementById('cpb').textContent='コピー';
}
function doCopy(){
  const el=document.getElementById('exp-text');el.select();
  navigator.clipboard?.writeText(el.value).then(()=>{
    document.getElementById('cpb').textContent='✅ コピーしました';
    setTimeout(()=>document.getElementById('cpb').textContent='コピー',2000);
  }).catch(()=>{document.execCommand('copy');});
}
function showImport(){
  document.getElementById('imp-area').style.display='block';
  document.getElementById('exp-area').style.display='none';
  document.getElementById('imp-text').value='';
}
function doImport(){
  try{
    const d=JSON.parse(document.getElementById('imp-text').value.trim());
    if(!d.stores||!d.cats){alert('形式が正しくありません');return;}
    if(!confirm('店名'+d.stores.length+'件・カテゴリー'+d.cats.length+'件を復元します。現在の設定は上書きされます。'))return;
    sSt(d.stores);sCt(d.cats);
    document.getElementById('imp-area').style.display='none';
    renderMaster();alert('✅ 復元しました');
  }catch(e){alert('テキストの読み込みに失敗しました');}
}

init();
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
