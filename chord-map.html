<style>
:root{
  --bg:#0d0d10;--surf:#141418;--surf2:#1c1c22;
  --bdr:rgba(255,255,255,0.07);--bdr2:rgba(255,255,255,0.13);
  --acc:#e8c547;--text:#e8e8ec;--dim:#62626e;
  --safe-t:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}

.hdr{flex-shrink:0;background:var(--surf);border-bottom:1px solid var(--bdr);
  padding:calc(var(--safe-t)+10px) 14px 10px;display:flex;align-items:center;gap:10px;}
.hdr-back{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);text-decoration:none;letter-spacing:.1em;flex-shrink:0;}
.hdr-title{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:var(--acc);letter-spacing:.15em;flex:1;}
.hdr-chord{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;color:var(--text);flex-shrink:0;}

.legend{flex-shrink:0;background:var(--surf2);border-bottom:1px solid var(--bdr);
  padding:4px 12px;display:flex;gap:10px;overflow-x:auto;align-items:center;}
.legend::-webkit-scrollbar{display:none;}
.li{display:flex;align-items:center;gap:3px;white-space:nowrap;}
.ldot{width:6px;height:6px;border-radius:50%;}
.ltxt{font-family:'DM Mono',monospace;font-size:8px;color:var(--dim);}

.tabs{flex-shrink:0;display:flex;border-bottom:1px solid var(--bdr);}
.tab{font-family:'DM Mono',monospace;font-size:11px;padding:7px 14px;
  cursor:pointer;color:var(--dim);border-bottom:2px solid transparent;flex:1;text-align:center;}
.tab.on{color:var(--acc);border-bottom-color:var(--acc);}

.main{flex:1;overflow:hidden;position:relative;}
.pane{display:none;width:100%;height:100%;flex-direction:column;}
.pane.show{display:flex;}

#map-wrap{flex:1;position:relative;overflow:hidden;}
#map-svg{width:100%;height:100%;display:block;touch-action:none;}

.pos-zone{flex-shrink:0;background:var(--surf2);border-top:1px solid var(--bdr);}
.pos-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:5px 12px 4px;cursor:pointer;user-select:none;}
.pos-hdr-l{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;color:var(--dim);text-transform:uppercase;}
.pos-toggle{font-size:9px;color:var(--dim);}
.pos-wrap{overflow:hidden;transition:max-height .2s;}
.pos-wrap.open{max-height:126px;}
.pos-wrap.closed{max-height:0;}
.pos-scroll{display:flex;gap:7px;overflow-x:auto;padding:0 10px 8px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.pos-scroll::-webkit-scrollbar{display:none;}
.pos-card{flex-shrink:0;background:var(--surf);border:1px solid var(--bdr2);border-radius:5px;
  padding:4px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:border-color .1s;}
.pos-card.sel{border-color:var(--acc);}
.pos-lbl{font-family:'DM Mono',monospace;font-size:7px;color:var(--dim);text-transform:uppercase;}

.path-bar{flex-shrink:0;background:var(--surf2);border-top:1px solid var(--bdr);
  padding:5px 10px;display:flex;gap:5px;overflow-x:auto;align-items:center;min-height:34px;scrollbar-width:none;}
.path-bar::-webkit-scrollbar{display:none;}
.ph-lbl{font-family:'DM Mono',monospace;font-size:8px;color:var(--dim);flex-shrink:0;letter-spacing:.1em;}
.ph{font-family:'DM Mono',monospace;font-size:10px;padding:2px 7px;border:1px solid var(--bdr2);
  border-radius:3px;color:var(--dim);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.ph.cur{border-color:var(--acc);color:var(--acc);background:rgba(232,197,71,.08);}
.ph-arr{color:var(--dim);font-size:10px;flex-shrink:0;}

.sel-view{flex:1;overflow-y:auto;padding:12px 14px;}
.slbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase;margin-bottom:7px;display:block;}
.rpills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;}
.rp{font-family:'DM Mono',monospace;font-size:12px;min-width:34px;height:29px;padding:0 5px;
  display:flex;align-items:center;justify-content:center;border:1px solid var(--bdr2);
  background:var(--surf2);color:var(--dim);border-radius:3px;cursor:pointer;}
.rp.on{background:var(--acc);border-color:var(--acc);color:#111;font-weight:500;}
.tgs{display:flex;flex-direction:column;gap:5px;}
.tgr{display:flex;align-items:flex-start;gap:7px;}
.tgl{font-family:'DM Mono',monospace;font-size:8px;color:var(--dim);padding-top:5px;
  width:34px;flex-shrink:0;text-align:right;padding-right:6px;border-right:1px solid var(--bdr2);}
.tgp{display:flex;flex-wrap:wrap;gap:4px;}
.tp{font-family:'DM Mono',monospace;font-size:10px;padding:3px 8px;border:1px solid var(--bdr2);
  background:var(--surf2);color:var(--dim);border-radius:3px;cursor:pointer;white-space:nowrap;}
.tp.on{background:rgba(232,197,71,.1);border-color:var(--acc);color:var(--acc);}

#adbg{position:fixed;bottom:4px;right:4px;font-size:9px;color:#888;
  font-family:monospace;z-index:9999;background:#111;padding:2px 5px;border-radius:3px;pointer-events:none;}

<script>
// ═══════════════════════════════
// MUSIC THEORY
// ═══════════════════════════════
const NOTES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const ni=n=>NOTES.indexOf(n);
const nn=n=>NOTES[((n%12)+12)%12];
const CT={
  major:{sym:'',iv:[0,4,7]},minor:{sym:'m',iv:[0,3,7]},
  dom7:{sym:'7',iv:[0,4,7,10]},m7:{sym:'m7',iv:[0,3,7,10]},
  maj7:{sym:'M7',iv:[0,4,7,11]},m9:{sym:'m9',iv:[0,3,7,10,2]},
  '9':{sym:'9',iv:[0,4,7,10,2]},maj9:{sym:'M9',iv:[0,4,7,11,2]},
  dim:{sym:'dim',iv:[0,3,6]},dim7:{sym:'°7',iv:[0,3,6,9]},
  aug:{sym:'+',iv:[0,4,8]},sus4:{sym:'sus4',iv:[0,5,7]},
  sus2:{sym:'sus2',iv:[0,2,7]},m7b5:{sym:'ø',iv:[0,3,6,10]},
  add9:{sym:'add9',iv:[0,4,7,2]},'6':{sym:'6',iv:[0,4,7,9]},
  mmaj7:{sym:'mM7',iv:[0,3,7,11]},m6:{sym:'m6',iv:[0,3,7,9]},
  '7b9':{sym:'7♭9',iv:[0,4,7,10,1]},'7s9':{sym:'7♯9',iv:[0,4,7,10,3]},
  '11':{sym:'11',iv:[0,4,7,10,2,5]},'13':{sym:'13',iv:[0,4,7,10,2,9]},
};
const GROUPS={
  Triad:['major','minor','dim','aug'],Sus:['sus2','sus4'],
  '7th':['dom7','m7','maj7','mmaj7','dim7','m7b5'],
  Add:['add9','6','m6'],'9th':['m9','9','maj9','11','13'],Alt:['7b9','7s9'],
};
const RHEX={diatonic:'#4aaa72',fifth:'#4a90d4',parallel:'#e8c547',modal:'#9a6ad4',chromatic:'#d4823a',subst:'#d44a6a'};
const ICOL={0:'#e8c547',3:'#4a90d4',4:'#4a90d4',7:'#4aaa72',10:'#9a6ad4',11:'#9a6ad4',2:'#d4823a',1:'#d4823a',5:'#5a90b0',9:'#5a90b0',6:'#777',8:'#777'};
const INAME={0:'R',1:'b9',2:'9',3:'b3',4:'3',5:'4',6:'b5',7:'5',8:'#5',9:'6',10:'b7',11:'M7'};
function cs(r,t){return r+(CT[t]?.sym??'');}
function cNotes(r,t){const ri=ni(r);return(CT[t]?.iv??[0,4,7]).map(i=>(ri+i)%12);}
function cProps(t){
  const iv=CT[t]?.iv??[0,4,7];
  return{isMaj:iv.includes(4)&&!iv.includes(3),isMin:iv.includes(3)&&!iv.includes(4),
    isDim:iv.includes(3)&&iv.includes(6),isAug:iv.includes(4)&&iv.includes(8),
    hasM7:iv.includes(11),hasb7:iv.includes(10),has9:iv.includes(2)||iv.includes(1)||iv.includes(3),
    has11:iv.includes(5),has13:iv.includes(9),isSus:t.includes('sus'),len:iv.length};
}

// ═══════════════════════════════
// 6 ARC SLIDERS
// Placed at 60° intervals around the chord circle.
// Each arc spans 50° (25° each side of its center angle).
// val: -1..+1  (0=center/neutral)
// ═══════════════════════════════
const SLIDERS=[
  {id:'bright', centerDeg:0,   labelL:'Dark',     labelR:'Bright',  col:'#e8d060', val:0},
  {id:'tense',  centerDeg:60,  labelL:'Calm',     labelR:'Tense',   col:'#d44a6a', val:0},
  {id:'warm',   centerDeg:120, labelL:'Cold',     labelR:'Warm',    col:'#d4823a', val:0},
  {id:'complex',centerDeg:180, labelL:'Simple',   labelR:'Complex', col:'#9a6ad4', val:0},
  {id:'moving', centerDeg:240, labelL:'Static',   labelR:'Moving',  col:'#4a90d4', val:0},
  {id:'strange',centerDeg:300, labelL:'Familiar', labelR:'Strange', col:'#4aaa72', val:0},
];
const ARC_HALF=42;    // half the arc span in degrees
const ARC_TRACK=8;    // track stroke width
const ARC_FILL=8;     // fill stroke width

function sVal(id){return SLIDERS.find(s=>s.id===id)?.val??0;}
function moodActive(){return SLIDERS.some(s=>Math.abs(s.val)>0.05);}

// deg → radians, 0=top (12 o'clock), CW positive
function deg2rad(d){return(d-90)*Math.PI/180;}

// Arc path on circle of radius r centered at cx,cy
// from angleDeg to angleDeg2 (CW)
function arcPath(cx,cy,r,a1,a2){
  const r1=deg2rad(a1),r2=deg2rad(a2);
  const x1=cx+r*Math.cos(r1),y1=cy+r*Math.sin(r1);
  const x2=cx+r*Math.cos(r2),y2=cy+r*Math.sin(r2);
  const large=Math.abs(a2-a1)>180?1:0;
  return`M${x1},${y1}A${r},${r},0,${large},1,${x2},${y2}`;
}

// Mood bonus for a chord given current slider vals
function moodBonus(r,t,rtype){
  const p=cProps(t);let b=0;
  const bright=sVal('bright');
  if(bright>0){if(p.isMaj)b+=bright*18;if(p.hasM7)b+=bright*10;if(p.isMin)b-=bright*8;if(p.isDim)b-=bright*15;}
  else if(bright<0){const d=-bright;if(p.isMin)b+=d*18;if(p.isDim)b+=d*12;if(p.isMaj&&!p.hasM7)b-=d*8;}
  const tense=sVal('tense');
  if(tense>0){if(rtype==='subst')b+=tense*20;if(rtype==='chromatic')b+=tense*15;if(p.isDim||p.isAug)b+=tense*14;if(p.isSus)b-=tense*10;if(rtype==='diatonic')b-=tense*8;}
  else if(tense<0){const c=-tense;if(p.isSus)b+=c*16;if(rtype==='diatonic')b+=c*14;if(p.hasM7&&p.isMaj)b+=c*12;if(rtype==='subst')b-=c*10;}
  const complex=sVal('complex');
  if(complex>0){b+=complex*(p.len-3)*5;if(p.has11||p.has13)b+=complex*14;if(p.has9)b+=complex*8;}
  else if(complex<0){const s=-complex;b+=s*(3-p.len)*5;if(p.len<=3)b+=s*12;if(p.len>=5)b-=s*14;}
  const moving=sVal('moving');
  if(moving>0){if(rtype==='fifth')b+=moving*18;if(rtype==='chromatic')b+=moving*12;if(rtype==='parallel')b-=moving*14;}
  else if(moving<0){const st=-moving;if(rtype==='parallel')b+=st*18;const cm=cNotes(r,t);const src=new Set(cNotes(S.root,S.type));let c2=0;cm.forEach(n=>{if(src.has(n))c2++;});b+=st*c2*4;}
  const warm=sVal('warm');
  if(warm>0){if(p.isMaj&&p.hasM7)b+=warm*16;if(t==='add9'||t==='maj9')b+=warm*14;if(p.isDim||rtype==='subst')b-=warm*8;}
  else if(warm<0){const co=-warm;if(p.isDim||p.isAug)b+=co*14;if(rtype==='subst'||rtype==='chromatic')b+=co*10;if(t==='m7b5')b+=co*12;}
  const strange=sVal('strange');
  if(strange>0){if(rtype==='modal')b+=strange*20;if(rtype==='subst')b+=strange*16;if(rtype==='diatonic')b-=strange*12;}
  else if(strange<0){const f=-strange;if(rtype==='diatonic')b+=f*20;if(rtype==='fifth')b+=f*16;if(rtype==='modal')b-=f*14;}
  return Math.max(-40,Math.min(40,Math.round(b)));
}

// ═══════════════════════════════
// RELATIONS
// ═══════════════════════════════
function buildRelations(root,type){
  const ri=ni(root);const src=new Set(cNotes(root,type));
  const res=[];const seen=new Set();
  function add(r,t,rtype,label,pri){
    const k=r+'__'+t;if(seen.has(k)||r===root&&t===type||!CT[t])return;
    seen.add(k);const cn=new Set(cNotes(r,t));let cm=0;src.forEach(n=>{if(cn.has(n))cm++;});
    res.push({root:r,type:t,rtype,label,priority:pri??8,common:cm,mb:moodBonus(r,t,rtype)});
  }
  const isMin=type.startsWith('m')&&!['maj7','maj9','mmaj7'].includes(type);
  const majD=[{iv:0,t:'major'},{iv:2,t:'minor'},{iv:4,t:'minor'},{iv:5,t:'major'},{iv:7,t:'dom7'},{iv:9,t:'minor'},{iv:11,t:'m7b5'}];
  const minD=[{iv:0,t:'minor'},{iv:2,t:'m7b5'},{iv:3,t:'major'},{iv:5,t:'minor'},{iv:7,t:'minor'},{iv:8,t:'major'},{iv:10,t:'dom7'}];
  (isMin?minD:majD).forEach(d=>add(nn(ri+d.iv),d.t,'diatonic',isMin?'Nat.m':'Maj',10));
  [{iv:0,t:'maj7'},{iv:2,t:'m7'},{iv:4,t:'m7'},{iv:5,t:'maj7'},{iv:7,t:'dom7'},{iv:9,t:'m7'},{iv:11,t:'m7b5'}].forEach(d=>add(nn(ri+d.iv),d.t,'diatonic','7th',8));
  add(nn(ri+7),'dom7','fifth','V7',20);add(nn(ri+7),'major','fifth','V',18);
  add(nn(ri+5),'major','fifth','IV',17);add(nn(ri+5),'maj7','fifth','IVM7',15);
  add(nn(ri+2),'minor','fifth','ii',14);add(nn(ri+2),'m7','fifth','ii7',13);
  add(nn(ri+5),'dom7','fifth','V/V',11);add(nn(ri+10),'dom7','fifth','♭VII7',12);
  add(nn(ri+10),'major','fifth','♭VII',10);add(nn(ri+3),'major','fifth','♭III',10);
  Object.keys(CT).forEach(t=>{if(t!==type)add(root,t,'parallel','para',5);});
  if(!isMin){
    add(nn(ri+3),'major','modal','♭III');add(nn(ri+8),'major','modal','♭VI');
    add(nn(ri+10),'major','modal','♭VII');add(nn(ri+5),'minor','modal','iv');
    add(root,'minor','modal','p.min',12);add(root,'m7','modal','p.m7',11);
    add(nn(ri+6),'major','modal','♯IV Lyd',9);add(nn(ri+1),'major','modal','♭II Phr',10);add(nn(ri+1),'dom7','modal','♭II7',9);
  }else{
    add(nn(ri+7),'major','modal','V mod',13);add(nn(ri+4),'major','modal','III',12);
    add(nn(ri+9),'major','modal','VI',11);add(root,'major','modal','p.maj',12);add(root,'maj7','modal','p.M7',11);
    add(nn(ri+11),'major','modal','VII Harm',10);add(nn(ri+11),'dom7','modal','VII7',10);
  }
  add(nn(ri+2),'dom7','modal','II7 Dor',9);add(nn(ri+5),'dom7','modal','IV7 Mix',8);
  add(nn(ri+1),'dom7','chromatic','♭II7',9);add(nn(ri+11),'dom7','chromatic','VII7',9);
  add(nn(ri+1),'major','chromatic','♭II',8);add(nn(ri+4),'major','chromatic','III',7);add(nn(ri+8),'major','chromatic','♯V',7);
  add(nn(ri+11),'dom7','chromatic','V/IV',10);add(nn(ri+4),'dom7','chromatic','V/V',10);
  add(nn(ri+9),'dom7','chromatic','V/ii',9);add(nn(ri+6),'dom7','chromatic','V/iii',8);
  add(nn(ri+1),'dom7','subst','TT sub',14);
  add(nn(ri+1),'dim7','subst','#I°7',10);add(nn(ri+3),'dim7','subst','#II°7',9);add(nn(ri+6),'dim7','subst','#IV°7',8);
  add(root,'aug','subst','aug sub',8);add(nn(ri+7),'aug','subst','V+',9);
  add(nn(ri+2),'m7b5','subst','iiø',9);add(nn(ri+5),'m7b5','subst','IVø',8);
  add(nn(ri+1),'maj7','subst','Neapol',9);add(nn(ri+9),'dim7','subst','CT dim',8);
  res.sort((a,b)=>(b.priority+b.common*2+b.mb)-(a.priority+a.common*2+a.mb));
  return res;
}

// ═══════════════════════════════
// AUDIO
// ═══════════════════════════════
let audioCtx=null;
const STR_HZ=[82.41,110.00,146.83,196.00,246.94,329.63];
const OPEN_S=[4,9,14,19,23,28];
const ntAt=(s,f)=>(OPEN_S[s]+f)%12;
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function pluck(ctx,hz,t0,vol){
  const o1=ctx.createOscillator(),o2=ctx.createOscillator(),g=ctx.createGain(),lp=ctx.createBiquadFilter();
  o1.type='sawtooth';o1.frequency.value=hz;o2.type='sawtooth';o2.frequency.value=hz*2;
  lp.type='lowpass';lp.frequency.value=hz*5;lp.Q.value=0.4;
  g.gain.setValueAtTime(vol,t0);g.gain.exponentialRampToValueAtTime(0.0001,t0+2.0);
  o1.connect(lp);o2.connect(lp);lp.connect(g);g.connect(ctx.destination);
  o1.start(t0);o1.stop(t0+2.0);o2.start(t0);o2.stop(t0+2.0);
}
function playChord(root,type){
  try{const ctx=getCtx();const ri=ni(root);const ivs=CT[type]?.iv??[0,4,7];
    const play=()=>{const t0=ctx.currentTime+0.05;const base=55*Math.pow(2,ri/12);
      ivs.forEach((iv,i)=>{const oct=i>=3?2:i>=2?1:0;pluck(ctx,base*Math.pow(2,(iv+oct*12)/12),t0+i*0.025,0.14);});dbg('♪');};
    if(ctx.state==='suspended')ctx.resume().then(play);else play();
  }catch(e){dbg('err:'+e.message);}
}
function playVoicing(frets){
  try{const ctx=getCtx();
    const play=()=>{const t0=ctx.currentTime+0.04;let cnt=0;
      frets.forEach((f,si)=>{if(f<0)return;pluck(ctx,STR_HZ[si]*Math.pow(2,f/12),t0+cnt*0.022,0.13);cnt++;});dbg('♪');};

// ARC SLIDER INTERACTION

function setupSliderDrag(svg,cx,cy,sliderR){
  // Convert pointer event → angle in degrees (0=top, CW)
  function pointerAngle(e){
    const rect=svg.getBoundingClientRect();
    const sx=e.clientX-rect.left,sy=e.clientY-rect.top;
    const vbW=svg.viewBox.baseVal.width,vbH=svg.viewBox.baseVal.height;
    const dx=sx*vbW/rect.width-cx,dy=sy*vbH/rect.height-cy;
    return(Math.atan2(dx,-dy)*180/Math.PI+360)%360;
  }

  // Hit test: is pointer near a slider's arc? Returns slider index or -1
  function hitTest(deg){
    for(let i=0;i<SLIDERS.length;i++){
      const sl=SLIDERS[i];
      // angle distance from arc center
      let diff=((deg-sl.centerDeg)+540)%360-180;
      if(Math.abs(diff)<=ARC_HALF+10) return i;
    }
    return -1;
  }

  svg.addEventListener('pointerdown',e=>{
    const angle=pointerAngle(e);
    const rect=svg.getBoundingClientRect();
    const sx=e.clientX-rect.left,sy=e.clientY-rect.top;
    const vbW=svg.viewBox.baseVal.width,vbH=svg.viewBox.baseVal.height;
    const dx=sx*vbW/rect.width-cx,dy=sy*vbH/rect.height-cy;
    const dist=Math.sqrt(dx*dx+dy*dy);
    // Only activate if close to slider ring
    if(Math.abs(dist-sliderR)>22) return;
    const idx=hitTest(angle);
    if(idx<0)return;
    e.preventDefault();
    svg.setPointerCapture(e.pointerId);
    dragSlider={idx,startAngle:angle,startVal:SLIDERS[idx].val};

    function onMove(e){
      if(!dragSlider)return;
      const sl=SLIDERS[dragSlider.idx];
      const newAngle=pointerAngle(e);
      let delta=newAngle-dragSlider.startAngle;
      if(delta>180)delta-=360;if(delta<-180)delta+=360;
      const newVal=Math.max(-1,Math.min(1,dragSlider.startVal+delta/ARC_HALF));
      sl.val=Math.abs(newVal)<0.04?0:Math.round(newVal*20)/20;
      renderAll();
    }
    function onUp(){
      dragSlider=null;
      svg.removeEventListener('pointermove',onMove);
      svg.removeEventListener('pointerup',onUp);
    }
    svg.addEventListener('pointermove',onMove);
    svg.addEventListener('pointerup',onUp);
  });

  // Double-tap arc to reset slider
  let lastTap={idx:-1,t:0};
  svg.addEventListener('click',e=>{
    const angle=pointerAngle(e);
    const rect=svg.getBoundingClientRect();
    const sx=e.clientX-rect.left,sy=e.clientY-rect.top;
    const vbW=svg.viewBox.baseVal.width,vbH=svg.viewBox.baseVal.height;
    const dx=sx*vbW/rect.width-cx,dy=sy*vbH/rect.height-cy;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(Math.abs(dist-sliderR)>22)return;
    const idx=hitTest(angle);if(idx<0)return;
    const now=Date.now();
    if(lastTap.idx===idx&&now-lastTap.t<400){SLIDERS[idx].val=0;renderAll();}
    lastTap={idx,t:now};
  });
}

const DB_RM={'C':'C','C#':'Csharp','D':'D','D#':'Eb','E':'E','F':'F','F#':'Fsharp','G':'G','G#':'Ab','A':'A','A#':'Bb','B':'B'};

function scoreV(v,ri,ivSet){
  let sc=100;const pr=v.filter(f=>f>0),so=v.filter(f=>f>=0);
  sc-=(pr.length>0?Math.max(...pr)-Math.min(...pr):0)*7;
  const mf=pr.length>0?Math.min(...pr):0;
  if(mf===0)sc+=18;else if(mf<=4)sc+=12;else if(mf>7)sc-=(mf-7)*3;
  const lo=v.findIndex(f=>f>=0);
  if(lo>=0){const f=v[lo];const n=f===0?OPEN_S[lo]%12:ntAt(lo,f);const iv=((n-ri)+12)%12;if(iv===0)sc+=25;else if(iv===7)sc+=5;else sc-=12;}
  const piv=new Set(v.map((f,s)=>f<0?-1:f===0?OPEN_S[s]%12:ntAt(s,f)).filter(n=>n>=0).map(n=>((n-ri)+12)%12));
  sc+=[...ivSet].filter(iv=>piv.has(iv)).length*8;
  if(piv.has(3)||piv.has(4))sc+=6;if(piv.has(10)||piv.has(11))sc+=6;
  if(so.length===5)sc+=8;else if(so.length===4)sc+=4;
  let fi=-1,li=-1;for(let i=0;i<6;i++){if(v[i]>=0){if(fi<0)fi=i;li=i;}}
  if(fi>=0){for(let i=fi;i<=li;i++){if(v[i]<0){sc-=18;break;}}}
  return sc;
}
function posLbl(v){const pr=v.filter(f=>f>0),ho=v.some(f=>f===0);if(ho&&(pr.length===0||Math.min(...pr)<=5))return'Open';return(pr.length>0?Math.min(...pr):0)+'fr';}
const VCACHE={};
function getVoicings(root,type){

  const iv=CT[type]?.iv;if(!iv)return[];
  const ri=ni(root);const ivSet=new Set(iv.map(i=>(i%12+12)%12));
  const db=[];

    const dr=DB_RM[root],dt=T2DB[type];
    if(dr&&dt){const ch=GUITAR_DB.chords[dr]||[];const fd=ch.find(c=>c.suffix===dt);
      if(fd?.positions)fd.positions.forEach(p=>db.push(p.frets.map(f=>f<=0?f:f+p.baseFret-1)));}

  const strO=[];
  for(let s=0;s<6;s++){const o=[-1];if(ivSet.has(((OPEN_S[s]%12-ri)+12)%12))o.push(0);
    for(let f=1;f<=15;f++){if(ivSet.has(((ntAt(s,f)-ri)+12)%12))o.push(f);}strO.push(o);}
  const raw=[];
  for(let ws=0;ws<=12;ws++){
    const we=ws+4;const wo=strO.map(o=>o.filter(f=>f===-1||f===0||(f>=ws+1&&f<=we)));
    function cb(si,cur){
      if(si===6){const pr=cur.filter(f=>f>0);if(cur.filter(f=>f>=0).length<3)return;
        if(pr.length>0&&Math.max(...pr)-Math.min(...pr)>4)return;
        const pv=new Set(cur.map((f,s)=>f<0?-1:f===0?OPEN_S[s]%12:ntAt(s,f)).filter(n=>n>=0).map(n=>((n-ri)+12)%12));
        if(!pv.has(0)||pv.size<2)return;raw.push([...cur]);return;}
      for(const f of wo[si]){cur.push(f);cb(si+1,cur);cur.pop();}
    }cb(0,[]);
  }
  const seen=new Set();const all=[];
  db.forEach(v=>{const kk=v.join(',');if(!seen.has(kk)){seen.add(kk);all.push({v,d:true});}});
  raw.forEach(v=>{const kk=v.join(',');if(!seen.has(kk)){seen.add(kk);all.push({v,d:false});}});
  all.sort((a,b)=>(scoreV(b.v,ri,ivSet)+(b.d?5:0))-(scoreV(a.v,ri,ivSet)+(a.d?5:0)));
  const res=all.slice(0,16).map(({v})=>({f:v,l:posLbl(v)}));VCACHE[k]=res;return res;
}
function makeDiag(frets,ri){

  const pr=frets.filter(f=>f>0),ho=frets.some(f=>f===0);
  const mf=pr.length>0?Math.min(...pr):0;let ws=0,isH=false;
  if(!ho&&pr.length>0&&mf>4){ws=mf-1;isH=true;}
  const x0=PL+NW,ys=IH;let s=`<svg width="${tW}" height="${tH}" viewBox="0 0 ${tW} ${tH}" xmlns="http://www.w3.org/2000/svg">`;
  const ci={};frets.forEach((f,si)=>{if(f<=0)return;const fw=f-ws;if(fw<1||fw>FR)return;const iv=((ntAt(si,f)-ri)+12)%12;if(!ci[fw])ci[fw]=new Set();ci[fw].add(iv);});
  for(let fc=1;fc<=FR;fc++){if(!ci[fc])continue;const x=x0+(fc-0.5)*FW;[...ci[fc]].forEach(iv=>{s+=`<text x="${x}" y="${IH-2}" font-size="6" fill="${ICOL[iv]||'#888'}" text-anchor="middle" font-family="DM Mono,monospace">${INAME[iv]}</text>`;});}
  frets.forEach((f,si)=>{if(f!==0)return;const row=STR-1-si;const iv=((OPEN_S[si]%12-ri)+12)%12;const y=ys+PT+row*SH;s+=`<text x="${PL-NW-2}" y="${y-5}" font-size="6" fill="${ICOL[iv]||'#888'}" text-anchor="middle" font-family="DM Mono,monospace">${INAME[iv]}</text>`;});
  if(!isH)s+=`<rect x="${PL}" y="${ys+PT}" width="${NW}" height="${SH*(STR-1)}" fill="#d8d0b8" rx="1"/>`;else s+=`<rect x="${PL}" y="${ys+PT}" width="1.5" height="${SH*(STR-1)}" fill="#444"/>`;
  for(let f=0;f<=FR;f++){const x=x0+f*FW;s+=`<line x1="${x}" y1="${ys+PT}" x2="${x}" y2="${ys+PT+SH*(STR-1)}" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>`;}
  for(let row=0;row<STR;row++){const si=STR-1-row;const y=ys+PT+row*SH;const sw=si===0?0.7:si===5?1.4:0.7+si*0.12;const al=0.2+si*0.05;s+=`<line x1="${PL}" y1="${y}" x2="${x0+FR*FW}" y2="${y}" stroke="rgba(220,200,160,${al})" stroke-width="${sw}"/>`;}
  for(let row=0;row<STR;row++){const si=STR-1-row;const f=frets[si];const y=ys+PT+row*SH;if(f<0)s+=`<text x="${PL-NW-2}" y="${y+3}" font-size="7" fill="#c04040" text-anchor="middle" font-family="DM Mono,monospace">x</text>`;else if(f===0)s+=`<circle cx="${PL-NW-2}" cy="${y}" r="2.5" fill="none" stroke="#4a8fd4" stroke-width="1"/>`;}
  for(let row=0;row<STR;row++){const si=STR-1-row;const f=frets[si];if(f<=0)continue;const fw=f-ws;if(fw<1||fw>FR)continue;const x=x0+(fw-0.5)*FW,y=ys+PT+row*SH;const iv=((ntAt(si,f)-ri)+12)%12;s+=`<circle cx="${x}" cy="${y}" r="5" fill="${ICOL[iv]||'#666'}"/>`;}
  const fnY=ys+PT+SH*(STR-1)+FH-1;
  for(let fc=1;fc<=FR;fc++){const absF=fc+ws;const x=x0+(fc-0.5)*FW;const mk=[3,5,7,9,12,15,17].includes(absF);s+=`<text x="${x}" y="${fnY}" font-size="6" fill="${mk?'#e8c547':'#4a4a56'}" text-anchor="middle" font-family="DM Mono,monospace">${absF}</text>`;}
  s+=`</svg>`;return s;
}
let posOpen=true;
function renderPosZone(){
  const scroll=document.getElementById('pos-scroll');
  scroll.innerHTML='<span style="font-family:\'DM Mono\',monospace;font-size:10px;color:var(--dim);padding:16px">…</span>';
  setTimeout(()=>{
    const ri=ni(S.root);const pos=getVoicings(S.root,S.type);
    if(!pos.length){scroll.innerHTML='<span style="font-family:\'DM Mono\',monospace;font-size:10px;color:var(--dim);padding:16px">—</span>';return;}
    scroll.innerHTML=pos.map((p,i)=>`<div class="pos-card${i===0?' sel':''}" data-i="${i}"><div class="pos-lbl">${p.l}</div>${makeDiag(p.f,ri)}</div>`).join('');
    scroll.querySelectorAll('.pos-card').forEach(c=>{
      c.addEventListener('click',()=>{scroll.querySelectorAll('.pos-card').forEach(x=>x.classList.remove('sel'));c.classList.add('sel');playVoicing(pos[parseInt(c.dataset.i)].f);});
    });
  },10);
}
document.getElementById('pos-hdr').addEventListener('click',()=>{
  posOpen=!posOpen;
  document.getElementById('pos-wrap').className='pos-wrap '+(posOpen?'open':'closed');
  document.getElementById('pos-toggle').textContent=posOpen?'▲':'▼';
});

// ═══════════════════════════════
// NAVIGATION
// ═══════════════════════════════
function moveToChord(root,type){
  playChord(root,type);
  S.history=S.history.slice(0,S.histIdx+1);S.history.push({root,type});S.histIdx=S.history.length-1;
  S.root=root;S.type=type;renderAll();renderPath();renderPosZone();
}
function renderPath(){
  const bar=document.getElementById('path-bar');const items=S.history.slice(0,S.histIdx+1);
  bar.innerHTML='<span class="ph-lbl">PATH</span>';
  items.forEach((c,i)=>{
    if(i>0){const a=document.createElement('span');a.className='ph-arr';a.textContent='›';bar.appendChild(a);}
    const n=document.createElement('div');n.className='ph'+(i===S.histIdx?' cur':'');n.textContent=cs(c.root,c.type);
    n.addEventListener('click',()=>{S.histIdx=i;S.root=c.root;S.type=c.type;renderAll();renderPath();renderPosZone();playChord(c.root,c.type);});
    bar.appendChild(n);
  });
  bar.scrollLeft=bar.scrollWidth;
}

// ═══════════════════════════════
// SELECTOR
// ═══════════════════════════════
function renderRoots(){
  const el=document.getElementById('root-pills');
  el.innerHTML=NOTES.map(n=>`<div class="rp${n===S.root?' on':''}" data-r="${n}">${n}</div>`).join('');
  el.querySelectorAll('.rp').forEach(p=>p.addEventListener('click',()=>{S.root=p.dataset.r;renderRoots();}));
}
function renderTypes(){
  const el=document.getElementById('type-groups');
  el.innerHTML=Object.entries(GROUPS).map(([g,ts])=>`<div class="tgr"><div class="tgl">${g}</div><div class="tgp">${ts.map(t=>`<div class="tp${t===S.type?' on':''}" data-t="${t}">${CT[t]?.sym||'maj'}</div>`).join('')}</div></div>`).join('');
  el.querySelectorAll('.tp').forEach(p=>p.addEventListener('click',()=>{S.type=p.dataset.t;renderTypes();}));
}

// ═══════════════════════════════
// TABS
// ═══════════════════════════════
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  const tab=t.dataset.tab;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');
  document.querySelectorAll('.pane').forEach(x=>x.classList.remove('show'));
  document.getElementById('pane-'+tab).classList.add('show');
  if(tab==='map'){S.history=[{root:S.root,type:S.type}];S.histIdx=0;renderAll();renderPath();renderPosZone();playChord(S.root,S.type);}
}));
window.addEventListener('resize',()=>{if(document.getElementById('pane-map').classList.contains('show'))renderAll();});

// ═══════════════════════════════
// INIT
// ═══════════════════════════════
renderRoots();renderTypes();renderAll();renderPath();renderPosZone();
</script>
